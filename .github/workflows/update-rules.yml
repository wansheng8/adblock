name: 更新广告拦截规则

on:
  schedule:
    # 每8小时运行一次 (UTC时间)
    - cron: '0 */8 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches:
      - main
    paths:
      - 'sources/sources.json'
      - 'scripts/**'

# 添加权限设置
permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create necessary directories
      run: |
        mkdir -p dist rules/raw rules/processed
    
    - name: Run update script
      run: |
        python scripts/update_rules.py
    
    - name: Check for changes
      id: check-changes
      run: |
        if git diff --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "没有变更需要提交"
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "检测到变更"
        fi
    
    - name: Commit and push changes
      if: steps.check-changes.outputs.has_changes == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 添加变更
        git add dist/
        git add rules/raw/
        git add rules/invalid_rules.log 2>/dev/null || true
        
        # 获取规则数量统计
        if [ -f "dist/blacklist.txt" ]; then
          BLACKLIST_COUNT=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
        else
          BLACKLIST_COUNT="0"
        fi
        
        if [ -f "dist/whitelist.txt" ]; then
          WHITELIST_COUNT=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
        else
          WHITELIST_COUNT="0"
        fi
        
        TOTAL_COUNT=$((BLACKLIST_COUNT + WHITELIST_COUNT))
        
        # 提交
        git commit -m "自动更新规则 $(date +'%Y-%m-%d %H:%M:%S')
        
        规则统计:
        - 黑名单规则: $BLACKLIST_COUNT
        - 白名单规则: $WHITELIST_COUNT
        - 总规则数: $TOTAL_COUNT
        
        [skip ci]"
        
        # 推送
        git push
