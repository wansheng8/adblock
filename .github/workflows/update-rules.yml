name: 更新广告拦截规则

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'sources/**'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create directories
      run: |
        mkdir -p dist rules/raw rules/processed
    
    - name: Run update script
      run: |
        python scripts/update_rules.py
    
    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
    
    - name: Commit changes
      if: success()
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "Changes detected"
          
          git add dist/ || true
          git add rules/raw/ || true
          
          BLACKLIST_COUNT=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
          WHITELIST_COUNT=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
          TOTAL_COUNT=$((BLACKLIST_COUNT + WHITELIST_COUNT))
          
          git commit -m "Auto update rules $(date +'%Y-%m-%d %H:%M:%S')
          
          Statistics:
          - Blacklist rules: $BLACKLIST_COUNT
          - Whitelist rules: $WHITELIST_COUNT
          - Total rules: $TOTAL_COUNT
          
          [skip ci]" || echo "No changes to commit"
        else
          echo "No changes detected"
        fi
    
    - name: Push changes
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -n "$(git log origin/main..HEAD 2>/dev/null)" ]; then
          git pull --rebase origin main || echo "Pull failed"
          git push origin HEAD:main
        fi
