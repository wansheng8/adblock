name: Update AdBlock Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'
  push:
    branches: [main]
    paths:
      - 'sources/**'
      - 'scripts/**'

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install requests
        
    - name: Create directories
      run: |
        mkdir -p dist
        mkdir -p rules/raw
        
    - name: Run updater
      run: |
        python scripts/update_rules.py
        
    - name: Commit changes
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add -A
        git commit -m "Update rules" || exit 0
        git push
