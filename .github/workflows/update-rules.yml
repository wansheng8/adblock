name: Update AdBlock Rules

on:
  workflow_dispatch:  # 手动触发
  schedule:
    # 每天运行3次（UTC时间0:00, 8:00, 16:00）
    - cron: '0 0,8,16 * * *'
  push:
    branches: [ main ]
    paths:
      - 'sources/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
    
    - name: Create directories
      run: |
        mkdir -p dist
        mkdir -p rules/raw
        mkdir -p rules/custom
        chmod +x scripts/*.py 2>/dev/null || true
    
    - name: Run rule updater
      run: python scripts/update_rules.py
    
    - name: Check for changes
      id: check-changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        if git diff --cached --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          
          # 获取规则统计
          DNS_COUNT=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          HOSTS_COUNT=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          FILTER_COUNT=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          
          # 创建提交信息
          cat > /tmp/commit_message.txt << EOF
🤖 Auto-update adblock rules $(date +'%Y-%m-%d %H:%M')

📊 Rules:
- DNS: $DNS_COUNT domains
- Hosts: $HOSTS_COUNT entries  
- Filter: $FILTER_COUNT rules
- Total: $((DNS_COUNT + HOSTS_COUNT + FILTER_COUNT)) rules

⚡ Optimized DNS detection (200 threads)
🔄 Auto-updated by GitHub Actions
EOF
          
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/commit_message.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
    
    - name: Commit and push
      if: steps.check-changes.outputs.changes == 'true'
      run: |
        git commit -m "${{ steps.check-changes.outputs.commit_message }}"
        git push
