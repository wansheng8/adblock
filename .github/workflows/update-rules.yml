name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
  schedule:
    # 北京时间: 08:00, 16:00, 00:00 (次日)
    # UTC时间: 00:00, 08:00, 16:00
    - cron: '0 0,8,16 * * *'
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml
    
    - name: Create directories
      run: |
        mkdir -p dist
        mkdir -p rules/raw
    
    - name: Step 1 - 规则源同步
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 规则源同步                  │"
        echo "│       (23个广告拦截源)                 │"
        echo "└─────────────────────────────────────────┘"
        python scripts/update_rules.py
    
    - name: Step 2 - 规则验证器
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔍 规则验证器                  │"
        echo "│         (语法检查/格式验证)             │"
        echo "└─────────────────────────────────────────┘"
        python scripts/validate_rules.py
    
    - name: Step 3 - 规则优化器
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ⚡ 规则优化器                  │"
        echo "│        (去重/分类/性能优化)             │"
        echo "└─────────────────────────────────────────┘"
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
        else
          echo "跳过规则优化"
        fi
    
    - name: Step 4 - 生成最终文件
      id: generate-files
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 生成最终文件                │"
        echo "│       (黑白名单/元数据/hosts)          │"
        echo "└─────────────────────────────────────────┘"
        
        # 确保文件存在
        touch dist/blacklist.txt dist/whitelist.txt
        
        # 统计规则数量
        black_rules=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
        white_rules=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
        
        echo "black_rules=$black_rules" >> $GITHUB_OUTPUT
        echo "white_rules=$white_rules" >> $GITHUB_OUTPUT
        
        echo "📊 规则统计:"
        echo "├── 黑名单: $black_rules 条规则"
        echo "└── 白名单: $white_rules 条规则"
    
    - name: Step 5 - 生成统计报告
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📈 生成统计报告                │"
        echo "│        (详细规则分析与报告)             │"
        echo "└─────────────────────────────────────────┘"
        
        # 创建统计报告
        if [ -f dist/blacklist.txt ] && [ -f dist/whitelist.txt ]; then
          # 获取当前时间（北京时间）
          current_time=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          
          # 统计规则详情
          total_black_rules=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
          total_white_rules=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
          
          # 按广告类型分类统计
          echo "开始分类统计..."
          
          # 创建统计报告文件
          cat > dist/statistics.md << 'EOF'
# 📊 AdBlock 规则统计报告

> 本报告由 GitHub Actions 自动生成，更新时间：${current_time}

## 📈 总体统计

| 指标 | 数量 | 说明 |
|------|------|------|
| 黑名单规则 | ${total_black_rules} 条 | 拦截广告和恶意内容的规则 |
| 白名单规则 | ${total_white_rules} 条 | 避免误拦截的例外规则 |
| 总规则数 | $((total_black_rules + total_white_rules)) 条 | 所有规则总和 |
| 规则文件大小 | $(ls -lh dist/blacklist.txt | awk '{print $5}') | 主规则文件大小 |
| 生成时间 | ${current_time} | 北京时间 |

## 🎯 广告拦截分类统计

EOF
          
          # 检查blacklist.txt是否存在并统计
          if [ -f dist/blacklist.txt ]; then
            # 统计各类型广告规则数量
            popup_ads=$(grep -ic 'popup\|fullscreen\|interstitial\|splash' dist/blacklist.txt || echo "0")
            video_ads=$(grep -ic 'video\|youtube\|pre-roll\|mid-roll\|post-roll' dist/blacklist.txt || echo "0")
            banner_ads=$(grep -ic 'banner\|leaderboard\|rectangle\|skyscraper' dist/blacklist.txt || echo "0")
            tracking=$(grep -ic 'track\|analytics\|pixel\|cookie\|tracking' dist/blacklist.txt || echo "0")
            malware=$(grep -ic 'malware\|phishing\|scam\|fraud\|virus' dist/blacklist.txt || echo "0")
            social_media=$(grep -ic 'facebook\|twitter\|instagram\|weibo\|social' dist/blacklist.txt || echo "0")
            
            # 将统计结果追加到报告
            cat >> dist/statistics.md << EOF
| 广告类型 | 规则数量 | 占比 | 主要拦截内容 |
|----------|----------|------|--------------|
| 开屏/弹窗广告 | ${popup_ads} 条 | $(echo "scale=1; ${popup_ads} * 100 / ${total_black_rules}" | bc -l 2>/dev/null || echo "0")% | 应用启动广告、弹出窗口 |
| 视频广告 | ${video_ads} 条 | $(echo "scale=1; ${video_ads} * 100 / ${total_black_rules}" | bc -l 2>/dev/null || echo "0")% | 视频前贴片、中插广告 |
| 横幅广告 | ${banner_ads} 条 | $(echo "scale=1; ${banner_ads} * 100 / ${total_black_rules}" | bc -l 2>/dev/null || echo "0")% | 页面横幅、矩形广告 |
| 跟踪器 | ${tracking} 条 | $(echo "scale=1; ${tracking} * 100 / ${total_black_rules}" | bc -l 2>/dev/null || echo "0")% | 用户行为跟踪脚本 |
| 恶意软件防护 | ${malware} 条 | $(echo "scale=1; ${malware} * 100 / ${total_black_rules}" | bc -l 2>/dev/null || echo "0")% | 恶意网站、钓鱼攻击 |
| 社交媒体跟踪 | ${social_media} 条 | $(echo "scale=1; ${social_media} * 100 / ${total_black_rules}" | bc -l 2>/dev/null || echo "0")% | 社交分享按钮追踪 |

EOF
          fi
          
          # 添加更新时间信息
          cat >> dist/statistics.md << 'EOF'

## 🔄 更新信息

- **最后更新时间**: ${current_time} (北京时间)
- **更新频率**: 每8小时自动更新
- **下次更新时间**: $(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')
- **数据来源**: 23个主流广告规则源

## 📁 文件列表

EOF
          
          # 添加文件列表
          echo "| 文件名 | 大小 | 描述 |" >> dist/statistics.md
          echo "|--------|------|------|" >> dist/statistics.md
          
          if [ -f dist/blacklist.txt ]; then
            size=$(ls -lh dist/blacklist.txt | awk '{print $5}')
            echo "| blacklist.txt | ${size} | 主广告拦截规则 |" >> dist/statistics.md
          fi
          
          if [ -f dist/whitelist.txt ]; then
            size=$(ls -lh dist/whitelist.txt | awk '{print $5}')
            echo "| whitelist.txt | ${size} | 白名单例外规则 |" >> dist/statistics.md
          fi
          
          if [ -f dist/metadata.json ]; then
            size=$(ls -lh dist/metadata.json | awk '{print $5}')
            echo "| metadata.json | ${size} | 规则元数据 |" >> dist/statistics.md
          fi
          
          # 添加使用说明
          cat >> dist/statistics.md << 'EOF'

## 📋 使用说明

### 订阅链接
- **主规则**: `https://raw.githubusercontent.com/wansheng8/adblock/main/dist/blacklist.txt`
- **白名单**: `https://raw.githubusercontent.com/wansheng8/adblock/main/dist/whitelist.txt`

### 支持平台
- ✅ uBlock Origin
- ✅ AdGuard
- ✅ AdBlock Plus
- ✅ Pi-hole
- ✅ AdGuard Home

### 更新周期
- 自动更新: 每8小时
- 手动更新: 可通过 GitHub Actions 页面手动触发

---

> 本报告由自动化系统生成，数据仅供参考。如有误拦截，请通过白名单规则添加例外。
EOF
          
          # 替换变量值
          sed -i "s/\${current_time}/${current_time}/g; \
                  s/\${total_black_rules}/${total_black_rules}/g; \
                  s/\${total_white_rules}/${total_white_rules}/g; \
                  s/\${popup_ads}/${popup_ads}/g; \
                  s/\${video_ads}/${video_ads}/g; \
                  s/\${banner_ads}/${banner_ads}/g; \
                  s/\${tracking}/${tracking}/g; \
                  s/\${malware}/${malware}/g; \
                  s/\${social_media}/${social_media}/g" dist/statistics.md
          
          echo "✅ 统计报告已生成: dist/statistics.md"
          echo "📄 报告包含详细的规则分类统计和使用说明"
        else
          echo "⚠️ 规则文件不存在，跳过统计报告生成"
        fi
    
    - name: Step 6 - 发布准备
      run: |
        echo ""
        echo "┌─────────────────────────────────────────────────────┐"
        echo "│            🚀 发布到 GitHub / CDN                   │"
        echo "├─────────────────────────────────────────────────────┤"
        echo "│    • 📄 blacklist.txt (主拦截规则)                 │"
        echo "│    • ✅ whitelist.txt (例外规则)                   │"
        echo "│    • 📊 metadata.json (规则元数据)                 │"
        echo "│    • 📈 statistics.md (统计报告)                   │"
        echo "└─────────────────────────────────────────────────────┘"
        
        # 显示文件大小
        echo "📁 文件大小:"
        ls -lh dist/*.txt dist/*.json dist/*.md 2>/dev/null || echo "dist目录中没有文件"
    
    - name: Step 7 - 检查变更
      id: check-changes
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 GitHub Actions               │"
        echo "│        (自动调度与变更检测)             │"
        echo "└─────────────────────────────────────────┘"
        
        git add -A
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> $GITHUB_OUTPUT
        else
          echo "🔄 检测到规则变更"
          echo "changes_detected=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Step 8 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 获取统计值
        BLACK_COUNT=${{ steps.generate-files.outputs.black_rules || 0 }}
        WHITE_COUNT=${{ steps.generate-files.outputs.white_rules || 0 }}
        COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
        
        # 使用纯Shell创建提交信息
        {
          echo "🤖 自动更新广告拦截规则 [$COMMIT_TIME]"
          echo ""
          echo "📊 规则统计:"
          echo "- 黑名单: $BLACK_COUNT 条规则"
          echo "- 白名单: $WHITE_COUNT 条规则"
          echo ""
          echo "📈 新增统计报告:"
          echo "- 详细规则分类分析"
          echo "- 广告类型占比统计"
          echo "- 完整使用说明文档"
          echo ""
          echo "✨ 拦截类型:"
          echo "• 开屏广告拦截"
          echo "• 弹窗广告拦截"
          echo "• 视频广告拦截"
          echo "• 横幅广告拦截"
          echo "• 内联广告拦截"
          echo ""
          echo "🛡️ 其他防护:"
          echo "• 跟踪器拦截"
          echo "• 恶意软件防护"
          echo "• 隐私保护"
          echo ""
          echo "🤖 由 GitHub Actions 自动生成"
        } > /tmp/commit_message.txt
        
        # 使用文件内容进行提交
        git commit -F /tmp/commit_message.txt
        git push
        
        echo "✅ 变更已提交到 GitHub"
    
    - name: Step 9 - 工作流完成
      if: always()
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ✅ 工作流执行完成              │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        echo "📅 运行时间设置 (北京时间):"
        echo "  每天 08:00, 16:00, 00:00 (次日)"
        echo ""
        echo "📊 生成文件:"
        echo "  • dist/blacklist.txt - 主拦截规则"
        echo "  • dist/whitelist.txt - 白名单规则"
        echo "  • dist/metadata.json - 规则元数据"
        echo "  • dist/statistics.md - 统计报告"
        echo ""
        echo "🕐 下次自动运行:"
        TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M (北京时间)'
