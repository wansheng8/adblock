name: AdBlock Rules Auto-Updater - Adblock语法版

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,8,16 * * *'  # 北京时间 08:00, 16:00, 00:00
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'sources/gz.txt'
      - 'scripts/**'
      - 'rules/custom/**'
      - '.github/workflows/update-rules.yml'

env:
  PYTHON_VERSION: '3.11'
  VALIDITY_THRESHOLD: '90'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        echo "📦 安装依赖..."
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
        echo "✅ 依赖安装完成"
    
    - name: Step 1 - 环境准备
      id: setup
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 环境准备                    │"
        echo "│    (Adblock语法版)                      │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 创建必要目录
        echo "📁 创建目录结构..."
        mkdir -p dist rules/raw rules/processed rules/custom
        
        # 检查重要文件
        echo "🔍 检查重要文件..."
        
        if [ ! -f "sources/sources.json" ]; then
          echo "❌ sources/sources.json 文件不存在"
          exit 1
        else
          echo "  ✅ sources/sources.json"
        fi
        
        if [ ! -f "scripts/update_rules.py" ]; then
          echo "❌ scripts/update_rules.py 文件不存在"
          exit 1
        else
          echo "  ✅ scripts/update_rules.py"
        fi
        
        # 检查 gz.txt 文件
        if [ -f "sources/gz.txt" ]; then
          size=$(wc -c < "sources/gz.txt" 2>/dev/null || echo "0")
          if [ "$size" -gt 0 ]; then
            echo "  ✅ sources/gz.txt (额外规则源)"
          else
            echo "  ⚠️  sources/gz.txt 为空"
          fi
        else
          echo "  ⚠️  sources/gz.txt 文件不存在，跳过额外规则源"
        fi
        
        echo "✅ 环境准备完成"
    
    - name: Step 2 - 规则源同步（Adblock语法）
      id: update-rules
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 规则源同步                  │"
        echo "│    (Adblock语法 + Ping检查)             │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则源同步..."
        
        # 运行规则更新脚本
        if [ -f scripts/update_rules.py ]; then
          python scripts/update_rules.py
          UPDATE_STATUS=$?
          
          if [ $UPDATE_STATUS -eq 0 ]; then
            echo "✅ 规则源同步成功"
            echo "update_success=true" >> "$GITHUB_OUTPUT"
          elif [ $UPDATE_STATUS -eq 1 ]; then
            echo "⚠️  规则源同步部分失败，继续执行"
            echo "update_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ 规则源同步失败，退出码: $UPDATE_STATUS"
            echo "update_success=false" >> "$GITHUB_OUTPUT"
            exit $UPDATE_STATUS
          fi
        else
          echo "❌ 规则更新脚本不存在"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        # 检查生成的文件
        echo "📄 检查生成的三层规则文件..."
        
        if [ -f dist/dns.txt ] && [ -s dist/dns.txt ]; then
          echo "  ✅ dns.txt 生成成功"
        else
          echo "  ❌ dns.txt 生成失败"
          exit 1
        fi
        
        if [ -f dist/hosts.txt ] && [ -s dist/hosts.txt ]; then
          echo "  ✅ hosts.txt 生成成功"
        else
          echo "  ❌ hosts.txt 生成失败"
          exit 1
        fi
        
        if [ -f dist/filter.txt ] && [ -s dist/filter.txt ]; then
          echo "  ✅ filter.txt 生成成功"
        else
          echo "  ❌ filter.txt 生成失败"
          exit 1
        fi
    
    - name: Step 3 - 规则格式化
      if: steps.update-rules.outputs.update_success == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🎨 规则格式化                  │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则格式化..."
        
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
        else
          echo "ℹ️  规则格式化脚本不存在，跳过此步骤"
        fi
    
    - name: Step 4 - 规则验证
      if: steps.update-rules.outputs.update_success == 'true'
      continue-on-error: true
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔍 规则验证                    │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则验证..."
        
        if [ -f scripts/validate_rules.py ]; then
          python scripts/validate_rules.py --simple
        else
          echo "ℹ️  验证脚本不存在，跳过验证"
        fi
    
    - name: Step 5 - 检查变更
      id: check-changes
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 检查变更                    │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "🔍 检查Git状态..."
        git add -A
        
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> "$GITHUB_OUTPUT"
        else
          echo "🔄 检测到变更"
          echo "changes_detected=true" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Step 6 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📤 提交变更                    │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 配置Git用户
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 统计规则数量
        DNS_COUNT=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        HOSTS_COUNT=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        FILTER_COUNT=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        TOTAL_COUNT=$((DNS_COUNT + HOSTS_COUNT + FILTER_COUNT))
        
        COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
        
        cat > /tmp/commit_message.txt << "EOF"
🤖 自动更新Adblock规则

📊 规则统计:
- DNS规则: $DNS_COUNT 条
- Hosts规则: $HOSTS_COUNT 条
- 浏览器规则: $FILTER_COUNT 条
- 总计: $TOTAL_COUNT 条规则

🎯 Adblock语法特性:
• 域名阻断 (||example.com^)
• 白名单 (@@||example.com^)
• 元素隐藏 (##.ad-banner)
• 脚本注入 (#$#)
• 正则表达式 (/ads.*\.com/)
• 高级修饰符 ($domain=, $important)

📡 包含Ping检查功能
⏰ 更新时间: $COMMIT_TIME (北京时间)
🌐 包含额外规则源: sources/gz.txt
🤖 由 GitHub Actions 自动生成
EOF
        
        # 替换变量
        sed -i "s/\$DNS_COUNT/$DNS_COUNT/g" /tmp/commit_message.txt
        sed -i "s/\$HOSTS_COUNT/$HOSTS_COUNT/g" /tmp/commit_message.txt
        sed -i "s/\$FILTER_COUNT/$FILTER_COUNT/g" /tmp/commit_message.txt
        sed -i "s/\$TOTAL_COUNT/$TOTAL_COUNT/g" /tmp/commit_message.txt
        sed -i "s/\$COMMIT_TIME/$COMMIT_TIME/g" /tmp/commit_message.txt
        
        git commit -F /tmp/commit_message.txt
        
        # 安全推送
        echo "🔄 安全推送..."
        git pull origin main --rebase || true
        git push origin HEAD:main || git push origin HEAD:main --force-with-lease
        
        echo "✅ 变更已提交"
    
    - name: Step 7 - 生成摘要
      if: always()
      run: |
        echo "📋 工作流执行完成"
        echo "状态: ${{ job.status }}"
