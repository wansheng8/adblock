name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
  schedule:
    # 北京时间: 08:00, 16:00, 00:00 (次日)
    # UTC时间: 00:00, 08:00, 16:00
    - cron: '0 0,8,16 * * *'
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml
    
    - name: Create directories
      run: |
        mkdir -p dist
        mkdir -p rules/raw
    
    - name: Step 1 - 规则源同步
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 规则源同步                  │"
        echo "│       (广告拦截源)                 │"
        echo "└─────────────────────────────────────────┘"
        python scripts/update_rules.py
    
    - name: Step 2 - 规则验证器
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔍 规则验证器                  │"
        echo "│         (语法检查/格式验证)             │"
        echo "└─────────────────────────────────────────┘"
        python scripts/validate_rules.py
    
    - name: Step 3 - 规则优化器
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ⚡ 规则优化器                  │"
        echo "│        (去重/分类/性能优化)             │"
        echo "└─────────────────────────────────────────┘"
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
        else
          echo "跳过规则优化"
        fi
    
    - name: Step 4 - 生成最终文件
      id: generate-files
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 生成最终文件                │"
        echo "│       (黑白名单/元数据/hosts)          │"
        echo "└─────────────────────────────────────────┘"
        
        # 确保文件存在
        touch dist/blacklist.txt dist/whitelist.txt
        
        # 统计规则数量
        black_rules=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
        white_rules=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
        
        echo "black_rules=$black_rules" >> $GITHUB_OUTPUT
        echo "white_rules=$white_rules" >> $GITHUB_OUTPUT
        
        echo "📊 规则统计:"
        echo "├── 黑名单: $black_rules 条规则"
        echo "└── 白名单: $white_rules 条规则"
    
    - name: Step 5 - 生成统计报告
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📈 生成统计报告                │"
        echo "│        (详细规则分析与报告)             │"
        echo "└─────────────────────────────────────────┘"
        
        # 创建Python脚本来生成统计报告
        cat > /tmp/generate_stats.py << 'EOF'
import os
import datetime

print('开始生成统计报告...')

# 获取当前时间（北京时间）
os.environ['TZ'] = 'Asia/Shanghai'
current_time = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')

# 统计规则数量
black_count = 0
white_count = 0

if os.path.exists('dist/blacklist.txt'):
    with open('dist/blacklist.txt', 'r', encoding='utf-8') as f:
        content = f.read()
        lines = content.split('\n')
        black_count = sum(1 for line in lines if line.strip() and not line.startswith('!'))

if os.path.exists('dist/whitelist.txt'):
    with open('dist/whitelist.txt', 'r', encoding='utf-8') as f:
        content = f.read()
        lines = content.split('\n')
        white_count = sum(1 for line in lines if line.strip() and not line.startswith('!'))

# 分类统计
category_counts = {}
if os.path.exists('dist/blacklist.txt'):
    with open('dist/blacklist.txt', 'r', encoding='utf-8') as f:
        content = f.read().lower()

    categories = {
        '开屏/弹窗广告': ['popup', 'fullscreen', 'interstitial', 'splash', '弹窗', '弹出'],
        '视频广告': ['video', 'youtube', 'pre-roll', 'mid-roll', 'post-roll', '视频', '贴片'],
        '横幅广告': ['banner', 'leaderboard', 'rectangle', 'skyscraper', '横幅', '通栏'],
        '跟踪器': ['track', 'analytics', 'pixel', 'cookie', 'tracking', '跟踪', '统计'],
        '恶意软件': ['malware', 'phishing', 'scam', 'fraud', 'virus', '恶意', '钓鱼'],
        '社交媒体': ['facebook', 'twitter', 'instagram', 'weibo', 'social', '社交']
    }

    for category, keywords in categories.items():
        count = sum(1 for keyword in keywords if keyword in content)
        category_counts[category] = count

# 生成统计报告
report_content = f'''# 📊 AdBlock 规则统计报告

> 本报告由 GitHub Actions 自动生成，更新时间：{current_time} (北京时间)

## 📈 总体统计

| 指标 | 数量 | 说明 |
|------|------|------|
| 黑名单规则 | {black_count} 条 | 拦截广告和恶意内容的规则 |
| 白名单规则 | {white_count} 条 | 避免误拦截的例外规则 |
| 总规则数 | {black_count + white_count} 条 | 所有规则总和 |
| 生成时间 | {current_time} | 北京时间 |

## 🎯 广告拦截分类统计

'''

# 添加分类统计表格
if os.path.exists('dist/blacklist.txt'):
    report_content += '''| 广告类型 | 规则数量 | 主要拦截内容 |
|----------|----------|--------------|
'''

    descriptions = {
        '开屏/弹窗广告': '应用启动广告、弹出窗口',
        '视频广告': '视频前贴片、中插广告',
        '横幅广告': '页面横幅、矩形广告',
        '跟踪器': '用户行为跟踪脚本',
        '恶意软件': '恶意网站、钓鱼攻击',
        '社交媒体': '社交分享按钮追踪'
    }

    for category, count in category_counts.items():
        if count > 0:
            report_content += f'| {category} | {count} 条 | {descriptions.get(category, "")} |\n'

# 添加更新时间信息
next_time = datetime.datetime.now() + datetime.timedelta(hours=8)
next_time_str = next_time.strftime('%Y-%m-%d %H:%M:%S')

report_content += f'''

## 🔄 更新信息

- **最后更新时间**: {current_time} (北京时间)
- **更新频率**: 每8小时自动更新
- **下次更新时间**: {next_time_str} (北京时间)
- **数据来源**: 23个主流广告规则源

## 📁 文件列表

| 文件名 | 描述 |
|--------|------|
| blacklist.txt | 主广告拦截规则 |
| whitelist.txt | 白名单例外规则 |
| metadata.json | 规则元数据 |
| statistics.md | 统计报告 |

## 📋 使用说明

### 订阅链接
- **主规则**: `https://raw.githubusercontent.com/wansheng8/adblock/main/dist/blacklist.txt`
- **白名单**: `https://raw.githubusercontent.com/wansheng8/adblock/main/dist/whitelist.txt`

### 支持平台
- ✅ uBlock Origin
- ✅ AdGuard
- ✅ AdBlock Plus
- ✅ Pi-hole
- ✅ AdGuard Home

### 更新周期
- 自动更新: 每8小时
- 手动更新: 可通过 GitHub Actions 页面手动触发

---

> 本报告由自动化系统生成，数据仅供参考。如有误拦截，请通过白名单规则添加例外。
'''

# 写入文件
with open('dist/statistics.md', 'w', encoding='utf-8') as f:
    f.write(report_content)

print(f'✅ 统计报告已生成: dist/statistics.md')
print(f'📊 黑名单规则: {black_count} 条')
print(f'📊 白名单规则: {white_count} 条')
EOF

        # 运行Python脚本
        python3 /tmp/generate_stats.py
    
    - name: Step 6 - 发布准备
      run: |
        echo ""
        echo "┌─────────────────────────────────────────────────────┐"
        echo "│            🚀 发布到 GitHub / CDN                   │"
        echo "├─────────────────────────────────────────────────────┤"
        echo "│    • 📄 blacklist.txt (主拦截规则)                 │"
        echo "│    • ✅ whitelist.txt (例外规则)                   │"
        echo "│    • 📊 metadata.json (规则元数据)                 │"
        echo "│    • 📈 statistics.md (统计报告)                   │"
        echo "└─────────────────────────────────────────────────────┘"
        
        # 显示文件大小
        echo "📁 文件大小:"
        ls -lh dist/*.txt dist/*.json dist/*.md 2>/dev/null || echo "dist目录中没有文件"
    
    - name: Step 7 - 检查变更
      id: check-changes
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 GitHub Actions               │"
        echo "│        (自动调度与变更检测)             │"
        echo "└─────────────────────────────────────────┘"
        
        git add -A
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> $GITHUB_OUTPUT
        else
          echo "🔄 检测到规则变更"
          echo "changes_detected=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Step 8 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 获取统计值
        BLACK_COUNT=${{ steps.generate-files.outputs.black_rules || 0 }}
        WHITE_COUNT=${{ steps.generate-files.outputs.white_rules || 0 }}
        COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
        
        # 使用纯Shell创建提交信息
        {
          echo "🤖 自动更新广告拦截规则 [$COMMIT_TIME]"
          echo ""
          echo "📊 规则统计:"
          echo "- 黑名单: $BLACK_COUNT 条规则"
          echo "- 白名单: $WHITE_COUNT 条规则"
          echo ""
          echo "📈 新增统计报告:"
          echo "- 详细规则分类分析"
          echo "- 广告类型占比统计"
          echo "- 完整使用说明文档"
          echo ""
          echo "✨ 拦截类型:"
          echo "• 开屏广告拦截"
          echo "• 弹窗广告拦截"
          echo "• 视频广告拦截"
          echo "• 横幅广告拦截"
          echo "• 内联广告拦截"
          echo ""
          echo "🛡️ 其他防护:"
          echo "• 跟踪器拦截"
          echo "• 恶意软件防护"
          echo "• 隐私保护"
          echo ""
          echo "🤖 由 GitHub Actions 自动生成"
        } > /tmp/commit_message.txt
        
        # 使用文件内容进行提交
        git commit -F /tmp/commit_message.txt
        git push
        
        echo "✅ 变更已提交到 GitHub"
    
    - name: Step 9 - 工作流完成
      if: always()
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ✅ 工作流执行完成              │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        echo "📅 运行时间设置 (北京时间):"
        echo "  每天 08:00, 16:00, 00:00 (次日)"
        echo ""
        echo "📊 生成文件:"
        echo "  • dist/blacklist.txt - 主拦截规则"
        echo "  • dist/whitelist.txt - 白名单规则"
        echo "  • dist/metadata.json - 规则元数据"
        echo "  • dist/statistics.md - 统计报告"
        echo ""
        echo "🕐 下次自动运行:"
        TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M (北京时间)'
