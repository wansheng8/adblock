name: Update AdBlock Rules

on:
  schedule:
    # 每8小时运行一次 (UTC时间)
    - cron: '0 */8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create necessary directories
      run: |
        mkdir -p dist rules/raw
    
    - name: Run update script
      run: |
        python scripts/update_rules.py
    
    - name: Clean old raw files (keep last 5)
      run: |
        echo "清理旧的原始规则文件..."
        # 保留最新的5个文件
        cd rules/raw
        ls -t *.txt | tail -n +6 | xargs rm -f 2>/dev/null || true
        echo "清理完成"
    
    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
    
    - name: Check for changes
      id: check-changes
      run: |
        # 检查是否有文件变更
        if [ -n "$(git status --porcelain dist/ rules/raw/ 2>/dev/null)" ]; then
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "检测到变更"
        else
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "没有检测到变更"
        fi
    
    - name: Commit changes
      if: steps.check-changes.outputs.has_changes == 'true'
      run: |
        echo "添加变更文件..."
        
        # 先删除旧的 .gitignore 缓存
        git rm -r --cached dist/ 2>/dev/null || true
        git rm -r --cached rules/raw/ 2>/dev/null || true
        
        # 添加文件
        git add dist/ || true
        git add rules/raw/ || true
        
        # 获取规则统计
        if [ -f "dist/blacklist.txt" ]; then
          BLACKLIST_COUNT=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
        else
          BLACKLIST_COUNT="0"
        fi
        
        if [ -f "dist/whitelist.txt" ]; then
          WHITELIST_COUNT=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
        else
          WHITELIST_COUNT="0"
        fi
        
        TOTAL_COUNT=$((BLACKLIST_COUNT + WHITELIST_COUNT))
        
        # 提交
        git commit -m "自动更新规则 $(date +'%Y-%m-%d %H:%M:%S')

规则统计:
- 黑名单: $BLACKLIST_COUNT 条
- 白名单: $WHITELIST_COUNT 条
- 总计: $TOTAL_COUNT 条

[skip ci]" || echo "没有新的变更"
        
        echo "提交完成"
    
    - name: Push changes
      if: steps.check-changes.outputs.has_changes == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "推送变更到远程仓库..."
        
        # 拉取最新更改
        git pull --rebase origin main 2>/dev/null || echo "拉取失败，继续推送"
        
        # 推送更改
        git push origin HEAD:main
        
        echo "推送完成"
