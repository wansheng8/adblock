name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
    inputs:
      log_level:
        description: 'Log level'
        required: true
        default: 'verbose'
        type: choice
        options:
        - verbose
        - quiet
  schedule:
    - cron: '0 0,8,16 * * *'  # UTC时间，对应北京时间 08:00, 16:00, 00:00
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'
      - 'sources/gz.txt'
      - 'rules/custom/**'
      - '.github/workflows/update-rules.yml'

env:
  PYTHON_VERSION: '3.11'

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 45
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
        echo "✅ Dependencies installed"
    
    - name: Prepare directories
      run: |
        echo "📁 Preparing directories..."
        mkdir -p dist rules/raw rules/processed rules/custom
        
        echo "🔧 Setting permissions..."
        chmod +x scripts/*.py || true
        
        echo "✅ Directories ready"
    
    - name: Clean previous files
      run: |
        echo "🧹 Cleaning old files..."
        rm -rf rules/raw/* 2>/dev/null || true
        rm -rf rules/processed/* 2>/dev/null || true
        echo "✅ Cleanup complete"
    
    - name: Run rule updater (Adblock + Ping)
      run: |
        echo "🚀 Running Adblock rule updater with Ping detection..."
        python scripts/update_rules.py
        
        echo "📊 Checking generated files..."
        if [ -f dist/dns.txt ] && [ -s dist/dns.txt ]; then
          dns_count=$(grep -v '^#' dist/dns.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "✅ DNS rules: $dns_count lines"
        else
          echo "❌ DNS rules file missing or empty"
          exit 1
        fi
        
        if [ -f dist/hosts.txt ] && [ -s dist/hosts.txt ]; then
          hosts_count=$(grep -v '^#' dist/hosts.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "✅ Hosts rules: $hosts_count lines"
        else
          echo "❌ Hosts rules file missing or empty"
          exit 1
        fi
        
        if [ -f dist/filter.txt ] && [ -s dist/filter.txt ]; then
          filter_count=$(grep -v '^!' dist/filter.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "✅ Filter rules: $filter_count lines"
        else
          echo "❌ Filter rules file missing or empty"
          exit 1
        fi
    
    - name: Format rules
      run: |
        echo "🎨 Formatting rules..."
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
          echo "✅ Formatting complete"
        else
          echo "⚠️ Format script not found, skipping"
        fi
    
    - name: Validate rules
      run: |
        echo "🔍 Validating rules..."
        if [ -f scripts/validate_rules.py ]; then
          python scripts/validate_rules.py --simple
          echo "✅ Validation complete"
        else
          echo "⚠️ Validate script not found, skipping"
        fi
    
    - name: Create summary report
      if: always()
      run: |
        echo "📋 Creating summary report..."
        
        # Get current timestamp
        TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        
        # Count rules
        DNS_COUNT=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        HOSTS_COUNT=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        FILTER_COUNT=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        TOTAL_COUNT=$((DNS_COUNT + HOSTS_COUNT + FILTER_COUNT))
        
        # Check ping results
        if [ -f dist/ping_results.json ]; then
          VALID_COUNT=$(grep -o '"valid_count":[0-9]*' dist/ping_results.json | grep -o '[0-9]*' || echo "0")
          FAILED_COUNT=$(grep -o '"failed_count":[0-9]*' dist/ping_results.json | grep -o '[0-9]*' || echo "0")
          TOTAL_PING=$((VALID_COUNT + FAILED_COUNT))
          if [ "$TOTAL_PING" -gt 0 ]; then
            SUCCESS_RATE=$((VALID_COUNT * 100 / TOTAL_PING))
          else
            SUCCESS_RATE=0
          fi
        else
          VALID_COUNT=0
          FAILED_COUNT=0
          SUCCESS_RATE=0
        fi
        
        cat > $GITHUB_STEP_SUMMARY << EOF
# 🎯 AdBlock Rules Update Summary
        
## 📊 Rule Statistics
| Rule Type | Count | Format |
|-----------|-------|--------|
| DNS Rules | $DNS_COUNT | Pure domains |
| Hosts Rules | $HOSTS_COUNT | 0.0.0.0 + domain |
| Filter Rules | $FILTER_COUNT | Adblock syntax |
| **Total** | **$TOTAL_COUNT** | All rules |

## 🔍 Ping Detection Results
- ✅ Reachable domains: **$VALID_COUNT**
- ❌ Unreachable domains: **$FAILED_COUNT**
- 📈 Success rate: **$SUCCESS_RATE%**

## 🎯 Adblock Syntax Features
- ✅ Whitelist rules (@@||domain.com^)
- ✅ Domain blocking rules (||domain.com^)
- ✅ Element hiding rules (##.ad-banner)
- ✅ Modifier rules (\$script,third-party)
- ✅ All domains verified by ping

## ⏰ Update Information
- **Update time**: $TIMESTAMP
- **Next update**: Every 8 hours
- **Additional sources**: sources/gz.txt
- **Syntax version**: Adblock v1.0

🤖 This update was automatically generated by GitHub Actions.
EOF
    
    - name: Commit and push changes
      if: success()
      run: |
        echo "🚀 Checking for changes..."
        
        # Configure git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Check if there are any changes
        if git diff --quiet --exit-code; then
          echo "✅ No changes detected"
          exit 0
        fi
        
        echo "📝 Changes detected, creating commit..."
        
        # Add changed files
        git add -A
        
        # Get rule counts for commit message
        DNS_COUNT=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        HOSTS_COUNT=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        FILTER_COUNT=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        TOTAL_COUNT=$((DNS_COUNT + HOSTS_COUNT + FILTER_COUNT))
        
        # Create commit message
        COMMIT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        
        git commit -m "🤖 Auto-update adblock rules [$COMMIT_TIME]

📊 Rules:
- DNS: $DNS_COUNT domains
- Hosts: $HOSTS_COUNT entries  
- Filter: $FILTER_COUNT rules
- Total: $TOTAL_COUNT rules

🎯 Adblock syntax with ping verification
🌐 Includes sources/gz.txt
🔄 Auto-updated by GitHub Actions"
        
        echo "📤 Pushing changes..."
        git push
        
        echo "✅ Changes pushed successfully"
