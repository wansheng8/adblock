        echo "  ├── 结束时间: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
        echo "  └── 运行环境: ${{ runner.os }}"
        echo ""
        
        echo "📅 运行时间设置 (北京时间):"
        echo "  每天 08:00, 16:00, 00:00 (次日)"
        echo ""
        
        echo "📊 生成文件 (新语法版):"
        echo "  • dist/dns.txt - DNS规则文件"
        echo "  • dist/hosts.txt - Hosts规则文件"
        echo "  • dist/filter.txt - 浏览器规则文件"
        echo "  • dist/metadata.json - 规则元数据"
        echo "  • dist/validation_report.json - 验证报告"
        echo "  • dist/advanced_statistics.md - 高级统计报告"
        echo "  • sources/gz.txt - 额外规则源"
        echo ""
        
        echo "🌐 三层规则系统:"
        echo "  • DNS规则: 纯域名格式，用于DNS服务"
        echo "  • Hosts规则: 0.0.0.0 + 域名格式"
        echo "  • 浏览器规则: 完整AdBlock语法"
        echo ""
        
        echo "⚡ 新语法特性:"
        echo "  • 语法分离: 不同用途使用不同语法"
        echo "  • 性能优化: 减少重复规则"
        echo "  • 严格验证: ${VALIDITY_THRESHOLD}%有效性要求"
        echo "  • 额外规则源: sources/gz.txt"
        echo ""
        
        # 下次运行时间
        echo "🕐 下次自动运行:"
        TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M (北京时间)'
        echo ""
        
        echo "🎉 广告拦截规则更新流程已完成!"
