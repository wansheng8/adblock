name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,8,16 * * *'  # 北京时间 08:00, 16:00, 00:00 (次日)
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'
      - 'sources/gz.txt'
      - 'rules/custom/**'
      - 'rules/whitelist_custom.txt'
      - '.github/workflows/update-rules.yml'

env:
  PYTHON_VERSION: '3.11'
  VALIDITY_THRESHOLD: '90'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        echo "📦 安装依赖..."
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
        echo "✅ 依赖安装完成"
    
    - name: Step 1 - 环境准备
      id: setup
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 环境准备                    │"
        echo "│    (创建目录/检查配置)                  │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 清理并重新创建目录结构
        echo "🧹 清理旧规则文件..."
        
        # 清空临时和中间目录
        if [ -d dist ]; then
          echo "  📁 清空 dist 目录..."
          rm -rf dist/*
        fi
        
        if [ -d rules/raw ]; then
          echo "  📁 清空 rules/raw 目录..."
          rm -rf rules/raw/*
        fi
        
        if [ -d rules/processed ]; then
          echo "  📁 清空 rules/processed 目录..."
          rm -rf rules/processed/*
        fi
        
        # 创建必要目录（如果不存在）
        echo "📁 创建目录结构..."
        mkdir -p dist rules/raw rules/processed rules/custom
        
        # 检查重要文件
        echo "🔍 检查重要文件..."
        
        if [ ! -f "sources/sources.json" ]; then
          echo "❌ sources/sources.json 文件不存在"
          exit 1
        else
          echo "  ✅ sources/sources.json"
        fi
        
        if [ ! -f "scripts/update_rules.py" ]; then
          echo "❌ scripts/update_rules.py 文件不存在"
          exit 1
        else
          echo "  ✅ scripts/update_rules.py"
        fi
        
        # 检查 gz.txt 文件
        if [ -f "sources/gz.txt" ]; then
          size=$(wc -c < "sources/gz.txt" 2>/dev/null || echo "0")
          if [ "$size" -gt 0 ]; then
            echo "  ✅ sources/gz.txt (额外规则源)"
          else
            echo "  ⚠️  sources/gz.txt 为空"
          fi
        else
          echo "  ⚠️  sources/gz.txt 文件不存在，跳过额外规则源"
        fi
        
        # 检查Python脚本权限
        echo "🔧 设置脚本权限..."
        chmod +x scripts/*.py 2>/dev/null || true
        
        echo "✅ 环境准备完成"
    
    - name: Step 2 - 规则源同步（三层规则）
      id: update-rules
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 规则源同步                  │"
        echo "│    (三层规则：DNS/Hosts/浏览器)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 确保 raw 目录是干净的
        echo "🧹 确保规则源目录干净..."
        if [ -d rules/raw ]; then
          find rules/raw -type f -name "*.txt" -delete 2>/dev/null || true
          find rules/raw -type f -name "*.json" -delete 2>/dev/null || true
        fi
        
        echo "📊 开始规则源同步..."
        START_TIME=$(date +%s)
        
        # 运行规则更新脚本
        if [ -f scripts/update_rules.py ]; then
          python scripts/update_rules.py
          UPDATE_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $UPDATE_STATUS -eq 0 ]; then
            echo "✅ 规则源同步成功 (耗时 ${DURATION}秒)"
            echo "update_success=true" >> "$GITHUB_OUTPUT"
          elif [ $UPDATE_STATUS -eq 1 ]; then
            echo "⚠️  规则源同步部分失败，继续执行 (耗时 ${DURATION}秒)"
            echo "update_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ 规则源同步失败，退出码: $UPDATE_STATUS (耗时 ${DURATION}秒)"
            echo "update_success=false" >> "$GITHUB_OUTPUT"
            exit $UPDATE_STATUS
          fi
        else
          echo "❌ 规则更新脚本不存在"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        # 显示下载的规则文件
        echo "📄 下载的规则文件:"
        if [ -d rules/raw ]; then
          RAW_FILES=$(find rules/raw -type f -name "*.txt" | wc -l)
          echo "  在 rules/raw 中找到 $RAW_FILES 个规则文件"
        else
          echo "  ⚠️  rules/raw 目录不存在"
        fi
        
        # 检查生成的三层规则文件
        echo "📄 检查生成的三层规则文件..."
        
        if [ -f dist/dns.txt ] && [ -s dist/dns.txt ]; then
          DNS_SIZE=$(wc -c < dist/dns.txt)
          DNS_RULES=$(grep -v '^#' dist/dns.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "  ✅ dns.txt: $DNS_RULES 条规则 ($((DNS_SIZE/1024))KB)"
        else
          echo "  ❌ dns.txt 生成失败"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        if [ -f dist/hosts.txt ] && [ -s dist/hosts.txt ]; then
          HOSTS_SIZE=$(wc -c < dist/hosts.txt)
          HOSTS_RULES=$(grep -v '^#' dist/hosts.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "  ✅ hosts.txt: $HOSTS_RULES 条规则 ($((HOSTS_SIZE/1024))KB)"
        else
          echo "  ❌ hosts.txt 生成失败"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        if [ -f dist/filter.txt ] && [ -s dist/filter.txt ]; then
          FILTER_SIZE=$(wc -c < dist/filter.txt)
          FILTER_RULES=$(grep -v '^!' dist/filter.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "  ✅ filter.txt: $FILTER_RULES 条规则 ($((FILTER_SIZE/1024))KB)"
        else
          echo "  ❌ filter.txt 生成失败"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
    
    - name: Step 3 - 规则合并（包含自定义规则）
      id: merge-rules
      if: steps.update-rules.outputs.update_success == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 规则合并                    │"
        echo "│    (合并自定义规则/优化去重)            │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📂 检查自定义规则..."
        CUSTOM_FOUND=false
        
        # 检查 rules/custom 目录
        if [ -d "rules/custom" ]; then
          CUSTOM_FILES=$(find rules/custom -name "*.txt" -type f 2>/dev/null | wc -l)
          if [ $CUSTOM_FILES -gt 0 ]; then
            echo "📄 在 rules/custom 中找到 $CUSTOM_FILES 个自定义规则文件"
            CUSTOM_FOUND=true
          fi
        fi
        
        if [ "$CUSTOM_FOUND" = false ]; then
          echo "ℹ️  未找到自定义规则文件，跳过合并步骤"
          exit 0
        fi
        
        echo "📄 开始合并自定义规则..."
        START_TIME=$(date +%s)
        
        # 清理 processed 目录
        if [ -d rules/processed ]; then
          echo "🧹 清理处理过的规则目录..."
          find rules/processed -type f -delete 2>/dev/null || true
        fi
        
        # 运行规则合并脚本
        if [ -f scripts/merge_rules.py ]; then
          # 运行合并脚本
          python scripts/merge_rules.py
          MERGE_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $MERGE_STATUS -eq 0 ]; then
            echo "✅ 规则合并成功 (耗时 ${DURATION}秒)"
          else
            echo "⚠️  规则合并过程出现警告 (耗时 ${DURATION}秒)"
          fi
        else
          echo "ℹ️  规则合并脚本不存在，跳过此步骤"
        fi
    
    - name: Step 4 - 规则验证器（新语法版）
      id: validate-rules
      if: steps.update-rules.outputs.update_success == 'true'
      continue-on-error: true
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔍 规则验证器                  │"
        echo "│    (三层规则语法验证)                   │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则验证..."
        START_TIME=$(date +%s)
        
        if [ ! -f scripts/validate_rules.py ]; then
          echo "❌ 规则验证脚本不存在"
          exit 0
        fi
        
        # 检查三层规则文件是否存在
        if [ ! -f dist/dns.txt ] || [ ! -s dist/dns.txt ]; then
          echo "❌ DNS规则文件不存在或为空"
          exit 0
        fi
        
        if [ ! -f dist/hosts.txt ] || [ ! -s dist/hosts.txt ]; then
          echo "❌ Hosts规则文件不存在或为空"
          exit 0
        fi
        
        if [ ! -f dist/filter.txt ] || [ ! -s dist/filter.txt ]; then
          echo "❌ 浏览器规则文件不存在或为空"
          exit 0
        fi
        
        # 运行验证脚本（简单模式）
        python scripts/validate_rules.py --simple
        VALIDATION_STATUS=$?
        
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        
        # 根据退出码判断验证结果
        if [ $VALIDATION_STATUS -eq 0 ]; then
          echo "✅ 规则验证通过 (耗时 ${DURATION}秒)"
        elif [ $VALIDATION_STATUS -eq 1 ]; then
          echo "⚠️  规则验证警告 (耗时 ${DURATION}秒)"
        elif [ $VALIDATION_STATUS -eq 2 ]; then
          echo "❌ 规则验证失败，没有有效规则 (耗时 ${DURATION}秒)"
        else
          echo "⚠️  规则验证过程出现未知错误，退出码: $VALIDATION_STATUS (耗时 ${DURATION}秒)"
        fi
        
        # 验证步骤不阻塞后续流程
        exit 0
    
    - name: Step 5 - 规则优化器（新语法版）
      if: steps.update-rules.outputs.update_success == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ⚡ 规则优化器                  │"
        echo "│ (去重/分类/性能优化/高级语法处理)       │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则优化..."
        START_TIME=$(date +%s)
        
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
          FORMAT_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $FORMAT_STATUS -eq 0 ]; then
            echo "✅ 规则优化成功 (耗时 ${DURATION}秒)"
          else
            echo "⚠️  规则优化过程出现警告 (耗时 ${DURATION}秒)"
          fi
        else
          echo "ℹ️  规则优化脚本不存在，跳过此步骤"
        fi
    
    - name: Step 6 - 生成最终文件（三层规则统计）
      id: generate-files
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 生成最终文件                │"
        echo "│  (统计规则/计算元数据/生成报告)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 确保文件存在
        touch dist/dns.txt dist/hosts.txt dist/filter.txt
        touch dist/metadata.json dist/validation_report.json 2>/dev/null || true
        
        # 统计规则数量
        echo "📊 统计三层规则数量..."
        
        DNS_RULES=0
        HOSTS_RULES=0
        FILTER_RULES=0
        TOTAL_RULES=0
        ENHANCED_RULES=0
        
        if [ -f dist/dns.txt ] && [ -s dist/dns.txt ]; then
          DNS_RULES=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' 2>/dev/null | wc -l 2>/dev/null || echo "0")
          DNS_RULES=$(echo "$DNS_RULES" | tr -cd '0-9')
          echo "📄 DNS规则统计: $DNS_RULES 条"
        fi
        
        if [ -f dist/hosts.txt ] && [ -s dist/hosts.txt ]; then
          HOSTS_RULES=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' 2>/dev/null | wc -l 2>/dev/null || echo "0")
          HOSTS_RULES=$(echo "$HOSTS_RULES" | tr -cd '0-9')
          echo "📄 Hosts规则统计: $HOSTS_RULES 条"
        fi
        
        if [ -f dist/filter.txt ] && [ -s dist/filter.txt ]; then
          FILTER_RULES=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' 2>/dev/null | wc -l 2>/dev/null || echo "0")
          FILTER_RULES=$(echo "$FILTER_RULES" | tr -cd '0-9')
          echo "📄 浏览器规则统计: $FILTER_RULES 条"
          
          # 统计增强语法规则
          ENHANCED_RULES=$(grep -E '@@\|\|\$dnstype=CNAME|\$category=|\$responsepolicy=' dist/filter.txt 2>/dev/null | wc -l 2>/dev/null || echo "0")
          ENHANCED_RULES=$(echo "$ENHANCED_RULES" | tr -cd '0-9')
          if [ "$ENHANCED_RULES" -gt 0 ]; then
            echo "⚡ 增强语法规则: $ENHANCED_RULES 条"
          fi
        fi
        
        TOTAL_RULES=$((DNS_RULES + HOSTS_RULES + FILTER_RULES))
        
        # 输出到环境变量
        {
          echo "dns_rules=$DNS_RULES"
          echo "hosts_rules=$HOSTS_RULES"
          echo "filter_rules=$FILTER_RULES"
          echo "total_rules=$TOTAL_RULES"
          echo "enhanced_rules=$ENHANCED_RULES"
        } >> "$GITHUB_OUTPUT"
        
        echo "✅ 文件统计完成"
    
    - name: Step 7 - 检查变更
      id: check-changes
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 检查变更                    │"
        echo "│    (自动调度与变更检测)                 │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "🔍 检查Git状态..."
        git status --porcelain
        
        echo ""
        echo "📋 检查文件变更..."
        
        # 添加所有变更
        git add -A
        
        # 检查是否有变更
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          echo "✅ 工作流完成，无需提交"
        else
          echo "🔄 检测到规则变更"
          echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          
          # 显示变更摘要
          echo ""
          echo "📋 变更摘要:"
          git diff --cached --name-only | while read -r file; do
            if echo "$file" | grep -q "^dist/"; then
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              if [ "$size" -ge 1024 ]; then
                size_human="$((size/1024))KB"
              else
                size_human="${size}B"
              fi
              echo "  📄 $file ($size_human)"
            elif echo "$file" | grep -q "^sources/gz.txt"; then
              echo "  🌐 $file (额外规则源)"
            elif echo "$file" | grep -q "^rules/"; then
              echo "  📁 $file"
            elif echo "$file" | grep -q "^scripts/"; then
              echo "  🛠️  $file"
            elif echo "$file" | grep -q "^sources/"; then
              echo "  🌐 $file"
            else
              echo "  📝 $file"
            fi
          done
        fi
    
    - name: Step 8 - 安全推送变更（修复版）
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 安全推送变更                │"
        echo "│    (修复推送冲突问题)                   │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 配置Git用户
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        echo "🔍 检查Git状态..."
        
        # 检查是否有更改需要提交
        if git diff --cached --quiet; then
          echo "✅ 没有需要提交的更改"
          exit 0
        fi
        
        echo "🔄 检测到变更，准备提交..."
        
        # 获取规则统计
        DNS_RULES=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        HOSTS_RULES=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        FILTER_RULES=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        TOTAL_RULES=$((DNS_RULES + HOSTS_RULES + FILTER_RULES))
        
        # 创建提交信息
        COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
        
        echo "🤖 自动更新广告拦截规则 [$COMMIT_TIME]" > /tmp/commit_message.txt
        echo "" >> /tmp/commit_message.txt
        echo "📊 规则统计:" >> /tmp/commit_message.txt
        echo "- DNS规则: $DNS_RULES 条" >> /tmp/commit_message.txt
        echo "- Hosts规则: $HOSTS_RULES 条" >> /tmp/commit_message.txt
        echo "- 浏览器规则: $FILTER_RULES 条" >> /tmp/commit_message.txt
        echo "- 总计: $TOTAL_RULES 条规则" >> /tmp/commit_message.txt
        echo "" >> /tmp/commit_message.txt
        echo "🎯 完整语法支持:" >> /tmp/commit_message.txt
        echo "• 白名单 (@@||domain^)" >> /tmp/commit_message.txt
        echo "• 精确域名匹配" >> /tmp/commit_message.txt
        echo "• 子域/通配 (||domain^)" >> /tmp/commit_message.txt
        echo "• CNAME拦截 (\$dnstype=CNAME)" >> /tmp/commit_message.txt
        echo "• 分类规则 (\$category=xxx)" >> /tmp/commit_message.txt
        echo "• 响应策略 (\$responsepolicy=xxx)" >> /tmp/commit_message.txt
        echo "" >> /tmp/commit_message.txt
        echo "🌐 包含额外规则源: sources/gz.txt" >> /tmp/commit_message.txt
        NEXT_UPDATE_TIME=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M')
        echo "⏰ 下次更新: $NEXT_UPDATE_TIME" >> /tmp/commit_message.txt
        echo "🤖 由 GitHub Actions 自动生成" >> /tmp/commit_message.txt
        
        echo "💾 提交变更..."
        git commit -F /tmp/commit_message.txt
        
        echo "📊 提交摘要:"
        git show --stat --oneline HEAD
        
        echo "🔄 执行安全推送策略..."
        
        # 方法1: 先拉取再推送（推荐）
        echo "1. 拉取远程最新更改..."
        if git pull origin main --rebase; then
          echo "✅ 拉取成功，正在推送..."
          if git push origin HEAD:main; then
            echo "✅ 推送成功"
          else
            echo "❌ 推送失败，尝试方法2"
            # 方法2: 使用 --force-with-lease（安全强制推送）
            echo "2. 使用安全强制推送 (--force-with-lease)..."
            if git push origin HEAD:main --force-with-lease; then
              echo "✅ 安全强制推送成功"
            else
              echo "❌ 安全强制推送失败，尝试方法3"
              # 方法3: 使用 --force（最后手段）
              echo "3. 使用强制推送 (--force)..."
              if git push origin HEAD:main --force; then
                echo "✅ 强制推送成功"
              else
                echo "❌ 所有推送方法都失败了"
                echo "⚠️  推送失败，但工作流继续执行..."
                # 不退出，让工作流继续
              fi
            fi
          fi
        else
          echo "❌ 拉取失败，尝试直接推送..."
          # 如果拉取失败，尝试直接推送
          if git push origin HEAD:main; then
            echo "✅ 直接推送成功"
          else
            echo "❌ 直接推送失败，尝试强制推送..."
            if git push origin HEAD:main --force-with-lease; then
              echo "✅ 强制推送成功"
            else
              echo "⚠️  推送失败，跳过推送步骤"
              # 不退出，让工作流继续
            fi
          fi
        fi
        
        echo "🎉 推送步骤完成"
    
    - name: Step 9 - 生成工作流摘要
      if: always()
      run: |
        # 创建摘要文件
        SUMMARY_FILE="$GITHUB_STEP_SUMMARY"
        
        echo "## 📋 AdBlock 规则更新摘要 - 完整语法版" > "$SUMMARY_FILE"
        echo "" >> "$SUMMARY_FILE"
        
        # 获取时间
        CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
        NEXT_TIME=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')
        
        # 从文件重新统计规则数量
        DNS_RULES=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        HOSTS_RULES=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        FILTER_RULES=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        TOTAL_RULES=$((DNS_RULES + HOSTS_RULES + FILTER_RULES))
        ENHANCED_RULES=$(grep -E '@@\|\|\$dnstype=CNAME|\$category=|\$responsepolicy=' dist/filter.txt 2>/dev/null | wc -l 2>/dev/null || echo "0")
        
        cat >> "$SUMMARY_FILE" << 'EOF'
        
        ### 📊 三层规则统计
        
        | 规则类型 | 数量 | 描述 |
        |----------|------|------|
        | DNS规则 | $DNS_RULES 条 | 纯域名格式，用于DNS服务 |
        | Hosts规则 | $HOSTS_RULES 条 | 0.0.0.0 + 域名格式 |
        | 浏览器规则 | $FILTER_RULES 条 | 完整AdBlock语法 |
        | **总计** | **$TOTAL_RULES 条** | 所有规则总和 |
        
        ### 🎯 增强语法支持
        
        - ✅ 白名单规则 (@@||domain^)
        - ✅ 精确域名匹配
        - ✅ 子域/通配规则 (||domain^)
        - ✅ CNAME拦截 ($dnstype=CNAME)
        - ✅ 分类规则 ($category=xxx)
        - ✅ 响应策略 ($responsepolicy=xxx)
        - ✅ 元素隐藏规则 (##selector)
        - ✅ 高级修饰符规则
        
        EOF
        
        # 添加文件列表
        cat >> "$SUMMARY_FILE" << 'EOF'
        ### 📁 生成的文件
        
        EOF
        
        if [ -d dist ]; then
          for file in dist/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              
              if [ "$size" -ge 1048576 ]; then
                human_size="$((size/1048576))MB"
              elif [ "$size" -ge 1024 ]; then
                human_size="$((size/1024))KB"
              else
                human_size="${size}B"
              fi
              
              case "$filename" in
                "dns.txt")
                  echo "- **dns.txt** - DNS规则文件 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "hosts.txt")
                  echo "- **hosts.txt** - Hosts规则文件 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "filter.txt")
                  echo "- **filter.txt** - 浏览器规则文件 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "metadata.json")
                  echo "- **metadata.json** - 规则元数据 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
              esac
            fi
          done
        fi
        
        cat >> "$SUMMARY_FILE" << EOF
        
        ### 🔄 更新信息
        
        - **更新时间**: $CURRENT_TIME (北京时间)
        - **更新频率**: 每8小时自动更新
        - **下次更新**: $NEXT_TIME (北京时间)
        - **验证标准**: 严格验证（阈值${VALIDITY_THRESHOLD}%）
        - **额外规则源**: sources/gz.txt
        - **新语法**: 三层规则系统
        
        ### 📋 步骤执行状态
        
        | 步骤 | 状态 |
        |------|------|
        | 环境准备 | ✅ |
        | 规则源同步 | ${{ steps.update-rules.outputs.update_success == 'true' && '✅' || '❌' }} |
        | 规则合并 | ${{ steps.setup.outputs.has_custom_rules == 'true' && '✅' || '⏭️' }} |
        | 规则验证 | ${{ steps.validate-rules.outputs.validation_exit_code == '0' && '✅' || steps.validate-rules.outputs.validation_exit_code == '1' && '⚠️' || '⏭️' }} |
        | 规则优化 | ✅ |
        | 文件生成 | ✅ |
        | 变更推送 | ${{ steps.check-changes.outputs.changes_detected == 'true' && '✅' || '⏭️' }} |
        
        🤖 由 GitHub Actions 自动执行
        EOF
    
