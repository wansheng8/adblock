name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,8,16 * * *'  # 北京时间 08:00, 16:00, 00:00 (次日)
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'
      - 'sources/gz.txt'
      - 'rules/custom/**'
      - '.github/workflows/update-rules.yml'

env:
  PYTHON_VERSION: '3.11'
  VALIDITY_THRESHOLD: '70'
  WORKFLOW_NAME: 'AdBlock Rules Auto-Updater'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        echo "📦 安装依赖..."
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml pyyaml tqdm
        echo "✅ 依赖安装完成"
        pip list
    
    - name: Step 1 - 环境准备
      id: setup
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 环境准备                    │"
        echo "│    (创建目录/检查配置)                  │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 创建必要目录
        echo "📁 创建目录结构..."
        mkdir -p dist rules/raw rules/processed rules/custom docs/reports
        
        # 检查重要文件
        echo "🔍 检查重要文件..."
        
        if [ ! -f "sources/sources.json" ]; then
          echo "❌ sources/sources.json 文件不存在"
          exit 1
        else
          echo "  ✅ sources/sources.json"
        fi
        
        if [ ! -f "scripts/update_rules.py" ]; then
          echo "❌ scripts/update_rules.py 文件不存在"
          exit 1
        else
          echo "  ✅ scripts/update_rules.py"
        fi
        
        # 检查Python脚本权限
        echo "🔧 设置脚本权限..."
        chmod +x scripts/*.py 2>/dev/null || true
        
        echo "✅ 环境准备完成"
    
    - name: Step 2 - 规则源同步
      id: update-rules
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 规则源同步                  │"
        echo "│    (23+个广告拦截源，包含混合规则)      │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则源同步..."
        START_TIME=$(date +%s)
        
        # 运行规则更新脚本
        if [ -f scripts/update_rules.py ]; then
          python scripts/update_rules.py
          UPDATE_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $UPDATE_STATUS -eq 0 ]; then
            echo "✅ 规则源同步成功 (耗时 ${DURATION}秒)"
            echo "update_success=true" >> "$GITHUB_OUTPUT"
          elif [ $UPDATE_STATUS -eq 1 ]; then
            echo "⚠️  规则源同步部分失败，继续执行 (耗时 ${DURATION}秒)"
            echo "update_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ 规则源同步失败，退出码: $UPDATE_STATUS (耗时 ${DURATION}秒)"
            echo "update_success=false" >> "$GITHUB_OUTPUT"
            exit $UPDATE_STATUS
          fi
        else
          echo "❌ 规则更新脚本不存在"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        # 检查生成的文件
        echo "📄 检查生成的文件..."
        if [ -f dist/blacklist.txt ] && [ -s dist/blacklist.txt ]; then
          BLACK_SIZE=$(wc -c < dist/blacklist.txt)
          echo "  ✅ blacklist.txt ($((BLACK_SIZE/1024))KB)"
        else
          echo "  ❌ blacklist.txt 生成失败"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        if [ -f dist/whitelist.txt ]; then
          WHITE_SIZE=$(wc -c < dist/whitelist.txt 2>/dev/null || echo "0")
          echo "  ✅ whitelist.txt ($((WHITE_SIZE/1024))KB)"
        else
          echo "  ⚠️  whitelist.txt 可能为空"
        fi
    
    - name: Step 3 - 规则合并
      id: merge-rules
      if: steps.update-rules.outputs.update_success == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 规则合并                    │"
        echo "│    (合并自定义规则/优化去重)            │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📂 检查自定义规则..."
        if [ ! -d "rules/custom" ]; then
          echo "ℹ️  自定义规则目录不存在，跳过合并步骤"
          echo "skip_merge=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        CUSTOM_FILES=$(find rules/custom -name "*.txt" -type f 2>/dev/null | wc -l)
        if [ $CUSTOM_FILES -eq 0 ]; then
          echo "ℹ️  未找到自定义规则文件，跳过合并步骤"
          echo "skip_merge=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        echo "📄 找到 $CUSTOM_FILES 个自定义规则文件"
        
        START_TIME=$(date +%s)
        
        # 运行规则合并脚本
        if [ -f scripts/merge_rules.py ]; then
          python scripts/merge_rules.py
          MERGE_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $MERGE_STATUS -eq 0 ]; then
            echo "✅ 规则合并成功 (耗时 ${DURATION}秒)"
            echo "skip_merge=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  规则合并过程出现警告 (耗时 ${DURATION}秒)"
            echo "skip_merge=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "ℹ️  规则合并脚本不存在，跳过此步骤"
          echo "skip_merge=true" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Step 4 - 规则验证器
      id: validate-rules
      if: steps.update-rules.outputs.update_success == 'true'
      continue-on-error: true
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔍 规则验证器                  │"
        echo "│    (宽松验证/区分错误警告)              │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则验证..."
        START_TIME=$(date +%s)
        
        if [ ! -f scripts/validate_rules.py ]; then
          echo "❌ 规则验证脚本不存在"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=3" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        if [ ! -f dist/blacklist.txt ] || [ ! -s dist/blacklist.txt ]; then
          echo "❌ 黑名单文件不存在或为空"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=4" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        # 运行验证脚本
        python scripts/validate_rules.py
        VALIDATION_STATUS=$?
        
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        
        # 根据退出码判断验证结果
        if [ $VALIDATION_STATUS -eq 0 ]; then
          echo "✅ 规则验证通过 (耗时 ${DURATION}秒)"
          echo "validation_passed=true" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=0" >> "$GITHUB_OUTPUT"
        elif [ $VALIDATION_STATUS -eq 1 ]; then
          echo "⚠️  规则验证警告，有效性低于$VALIDITY_THRESHOLD% (耗时 ${DURATION}秒)"
          echo "ℹ️  注意：使用宽松验证标准，大多数规则被接受"
          echo "validation_passed=true" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=1" >> "$GITHUB_OUTPUT"
        elif [ $VALIDATION_STATUS -eq 2 ]; then
          echo "❌ 规则验证失败，没有有效规则 (耗时 ${DURATION}秒)"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=2" >> "$GITHUB_OUTPUT"
        else
          echo "⚠️  规则验证过程出现未知错误，退出码: $VALIDATION_STATUS (耗时 ${DURATION}秒)"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=$VALIDATION_STATUS" >> "$GITHUB_OUTPUT"
        fi
        
        # 验证步骤不阻塞后续流程
        exit 0
    
    - name: Step 5 - 规则优化器
      if: steps.validate-rules.outputs.validation_passed == 'true' || steps.validate-rules.outputs.validation_exit_code == '1'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ⚡ 规则优化器                  │"
        echo "│ (去重/分类/性能优化/高级语法处理)       │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则优化..."
        START_TIME=$(date +%s)
        
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
          FORMAT_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $FORMAT_STATUS -eq 0 ]; then
            echo "✅ 规则优化成功 (耗时 ${DURATION}秒)"
          else
            echo "⚠️  规则优化过程出现警告 (耗时 ${DURATION}秒)"
          fi
        else
          echo "ℹ️  规则优化脚本不存在，跳过此步骤"
        fi
    
    - name: Step 6 - 生成最终文件
      id: generate-files
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 生成最终文件                │"
        echo "│  (统计规则/计算元数据/生成报告)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 确保文件存在
        touch dist/blacklist.txt dist/whitelist.txt
        touch dist/metadata.json dist/validation_report.json 2>/dev/null || true
        
        # 统计规则数量
        echo "📊 统计规则数量..."
        
        if [ -f dist/blacklist.txt ]; then
          BLACK_RULES=$(grep -v '^!' dist/blacklist.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          BLACK_LINES=$(wc -l < dist/blacklist.txt 2>/dev/null || echo "0")
          BLACK_SIZE=$(wc -c < dist/blacklist.txt 2>/dev/null || echo "0")
          echo "📄 黑名单统计:"
          echo "  ├── 有效规则: $BLACK_RULES 条"
          echo "  ├── 总行数: $BLACK_LINES 行"
          echo "  └── 文件大小: $((BLACK_SIZE/1024))KB"
        else
          BLACK_RULES=0
          BLACK_LINES=0
          BLACK_SIZE=0
          echo "❌ 黑名单文件不存在"
        fi
        
        if [ -f dist/whitelist.txt ]; then
          WHITE_RULES=$(grep -v '^!' dist/whitelist.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          WHITE_LINES=$(wc -l < dist/whitelist.txt 2>/dev/null || echo "0")
          WHITE_SIZE=$(wc -c < dist/whitelist.txt 2>/dev/null || echo "0")
          echo "📄 白名单统计:"
          echo "  ├── 有效规则: $WHITE_RULES 条"
          echo "  ├── 总行数: $WHITE_LINES 行"
          echo "  └── 文件大小: $((WHITE_SIZE/1024))KB"
        else
          WHITE_RULES=0
          WHITE_LINES=0
          WHITE_SIZE=0
          echo "❌ 白名单文件不存在"
        fi
        
        TOTAL_RULES=$((BLACK_RULES + WHITE_RULES))
        TOTAL_SIZE=$((BLACK_SIZE + WHITE_SIZE))
        
        # 高级规则统计
        ADVANCED_RULES=0
        MODIFIER_RULES=0
        DOMAIN_RULES=0
        ELEMENT_RULES=0
        
        if [ -f dist/blacklist.txt ]; then
          echo "⚡ 高级规则统计..."
          ADVANCED_RULES=$(grep -c -E '#@#|#?#|\$\$' dist/blacklist.txt 2>/dev/null || echo "0")
          MODIFIER_RULES=$(grep -c '\$' dist/blacklist.txt 2>/dev/null || echo "0")
          DOMAIN_RULES=$(grep -c '^||' dist/blacklist.txt 2>/dev/null || echo "0")
          ELEMENT_RULES=$(grep -c '^##' dist/blacklist.txt 2>/dev/null || echo "0")
          
          echo "  ├── 域名拦截规则: $DOMAIN_RULES 条"
          echo "  ├── 元素隐藏规则: $ELEMENT_RULES 条"
          echo "  ├── 高级规则: $ADVANCED_RULES 条"
          echo "  └── 修饰符规则: $MODIFIER_RULES 条"
        fi
        
        # 输出到环境变量
        echo "black_rules=$BLACK_RULES" >> "$GITHUB_OUTPUT"
        echo "white_rules=$WHITE_RULES" >> "$GITHUB_OUTPUT"
        echo "total_rules=$TOTAL_RULES" >> "$GITHUB_OUTPUT"
        echo "advanced_rules=$ADVANCED_RULES" >> "$GITHUB_OUTPUT"
        echo "black_size=$BLACK_SIZE" >> "$GITHUB_OUTPUT"
        echo "white_size=$WHITE_SIZE" >> "$GITHUB_OUTPUT"
        echo "total_size=$TOTAL_SIZE" >> "$GITHUB_OUTPUT"
        
        echo "✅ 文件统计完成"
    
    - name: Step 7 - 生成高级统计报告
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📈 生成高级统计报告            │"
        echo "│    (详细规则分析/分类统计/趋势)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 创建报告文件
        echo "📄 创建高级统计报告..."
        
        # 获取时间
        CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
        NEXT_TIME=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')
        
        # 直接从文件读取统计信息，避免复杂的变量传递
        if [ -f dist/blacklist.txt ]; then
          BLACK_RULES=$(grep -v '^!' dist/blacklist.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          BLACK_SIZE=$(wc -c < dist/blacklist.txt 2>/dev/null || echo "0")
        else
          BLACK_RULES=0
          BLACK_SIZE=0
        fi
        
        if [ -f dist/whitelist.txt ]; then
          WHITE_RULES=$(grep -v '^!' dist/whitelist.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          WHITE_SIZE=$(wc -c < dist/whitelist.txt 2>/dev/null || echo "0")
        else
          WHITE_RULES=0
          WHITE_SIZE=0
        fi
        
        TOTAL_RULES=$((BLACK_RULES + WHITE_RULES))
        TOTAL_SIZE=$((BLACK_SIZE + WHITE_SIZE))
        
        # 高级规则统计
        if [ -f dist/blacklist.txt ]; then
          ADVANCED_RULES=$(grep -c -E '#@#|#?#|\$\$' dist/blacklist.txt 2>/dev/null || echo "0")
        else
          ADVANCED_RULES=0
        fi
        
        # 文件大小格式化
        format_size() {
          local bytes=$1
          if [ "$bytes" -ge 1073741824 ]; then
            echo "$((bytes/1073741824))GB"
          elif [ "$bytes" -ge 1048576 ]; then
            echo "$((bytes/1048576))MB"
          elif [ "$bytes" -ge 1024 ]; then
            echo "$((bytes/1024))KB"
          else
            echo "${bytes}B"
          fi
        }
        
        BLACK_SIZE_HUMAN=$(format_size "$BLACK_SIZE")
        WHITE_SIZE_HUMAN=$(format_size "$WHITE_SIZE")
        TOTAL_SIZE_HUMAN=$(format_size "$TOTAL_SIZE")
        
        # 验证状态
        VALIDATION_EXIT_CODE="0"
        if [ -n "${{ steps.validate-rules.outputs.validation_exit_code }}" ]; then
          VALIDATION_EXIT_CODE="${{ steps.validate-rules.outputs.validation_exit_code }}"
        fi
        
        # 创建报告
        {
          echo "# 📊 AdBlock 规则高级统计报告"
          echo ""
          echo "> 本报告由 GitHub Actions 自动生成，更新时间: $CURRENT_TIME"
          echo ""
          
          echo "## 📈 总体统计"
          echo ""
          echo "| 指标 | 数值 | 说明 |"
          echo "|------|------|------|"
          echo "| 黑名单规则 | $BLACK_RULES 条 | 拦截广告和恶意内容 |"
          echo "| 白名单规则 | $WHITE_RULES 条 | 避免误拦截的例外 |"
          echo "| 总规则数 | $TOTAL_RULES 条 | 所有规则总和 |"
          echo "| 高级规则 | $ADVANCED_RULES 条 | 包含高级语法 |"
          echo "| 黑名单大小 | $BLACK_SIZE_HUMAN | 文件占用空间 |"
          echo "| 白名单大小 | $WHITE_SIZE_HUMAN | 文件占用空间 |"
          echo "| 总计大小 | $TOTAL_SIZE_HUMAN | 总文件大小 |"
          echo "| 生成时间 | $CURRENT_TIME | 北京时间 |"
          echo ""
          
          echo "## 🔍 验证状态"
          echo ""
          
          case "$VALIDATION_EXIT_CODE" in
            0)
              echo "✅ **验证通过** - 所有规则语法检查通过"
              ;;
            1)
              echo "⚠️ **验证警告** - 规则有效性低于${VALIDITY_THRESHOLD}%，但已通过宽松验证"
              ;;
            2)
              echo "❌ **验证失败** - 没有有效规则"
              ;;
            *)
              echo "❓ **验证状态未知** - 退出码: $VALIDATION_EXIT_CODE"
              ;;
          esac
          
          echo ""
          
          echo "## 🎯 规则类型分布"
          echo ""
          echo "| 规则类型 | 描述 | 示例 |"
          echo "|----------|------|------|"
          echo "| 域名拦截 | 拦截特定域名的请求 | \`||example.com^\` |"
          echo "| 元素隐藏 | 隐藏页面元素 | \`##.ad-banner\` |"
          echo "| 高级选择器 | 复杂元素选择 | \`#?#div:-abp-has(> .ad)\` |"
          echo "| 参数移除 | 移除URL参数 | \`||example.com^\$removeparam=utm_\*\` |"
          echo "| 域名限定 | 特定域名生效 | \`||ads.com^\$domain=example.com\` |"
          echo ""
          
          echo "## 🔄 更新信息"
          echo ""
          echo "- **最后更新时间**: $CURRENT_TIME (北京时间)"
          echo "- **更新频率**: 每8小时自动更新"
          echo "- **下次更新时间**: $NEXT_TIME (北京时间)"
          echo "- **数据来源**: 23+个主流广告规则源"
          echo "- **验证标准**: 宽松验证（阈值${VALIDITY_THRESHOLD}%）"
          echo ""
          
          echo "## 📁 文件列表"
          echo ""
          echo "| 文件名 | 描述 | 大小 |"
          echo "|--------|------|------|"
          
          if [ -d dist ]; then
            for file in dist/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                size=$(wc -c < "$file" 2>/dev/null || echo "0")
                human_size=$(format_size "$size")
                
                case "$filename" in
                  "blacklist.txt")
                    desc="主广告拦截规则"
                    ;;
                  "whitelist.txt")
                    desc="白名单例外规则"
                    ;;
                  "metadata.json")
                    desc="规则元数据"
                    ;;
                  "validation_report.json")
                    desc="验证报告"
                    ;;
                  "advanced_statistics.md")
                    desc="高级统计报告"
                    ;;
                  *)
                    desc="其他文件"
                    ;;
                esac
                
                echo "| $filename | $desc | $human_size |"
              fi
            done
          fi
          
          echo ""
        } > dist/advanced_statistics.md
        
        echo "✅ 高级统计报告已生成: dist/advanced_statistics.md"
    
    - name: Step 8 - 质量检查
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🧪 质量检查                    │"
        echo "│    (文件完整性/格式检查)                │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "🔍 执行质量检查..."
        
        # 检查文件完整性
        ERROR_COUNT=0
        WARNING_COUNT=0
        
        # 1. 检查黑名单文件
        if [ -f dist/blacklist.txt ]; then
          if [ ! -s dist/blacklist.txt ]; then
            echo "❌ 黑名单文件为空"
            ERROR_COUNT=$((ERROR_COUNT + 1))
          else
            # 检查是否有内容（不只是注释）
            CONTENT_LINES=$(grep -v '^!' dist/blacklist.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
            if [ "$CONTENT_LINES" -eq 0 ]; then
              echo "⚠️  黑名单文件没有有效规则（只有注释）"
              WARNING_COUNT=$((WARNING_COUNT + 1))
            fi
          fi
        else
          echo "❌ 黑名单文件不存在"
          ERROR_COUNT=$((ERROR_COUNT + 1))
        fi
        
        # 2. 检查文件编码
        echo "📝 检查文件编码..."
        # 使用 find 命令来查找文件，避免 glob 扩展问题
        find dist -maxdepth 1 \( -name "*.txt" -o -name "*.md" \) 2>/dev/null | while read -r file; do
          if [ -f "$file" ]; then
            if file "$file" | grep -q "UTF-8"; then
              echo "  ✅ $(basename "$file"): UTF-8 编码"
            else
              echo "  ⚠️  $(basename "$file"): 非UTF-8编码"
              WARNING_COUNT=$((WARNING_COUNT + 1))
            fi
          fi
        done
        
        # 3. 检查JSON格式
        if [ -f dist/metadata.json ]; then
          if python3 -m json.tool dist/metadata.json > /dev/null 2>&1; then
            echo "✅ metadata.json: JSON格式正确"
          else
            echo "❌ metadata.json: JSON格式错误"
            ERROR_COUNT=$((ERROR_COUNT + 1))
          fi
        fi
        
        if [ -f dist/validation_report.json ]; then
          if python3 -m json.tool dist/validation_report.json > /dev/null 2>&1; then
            echo "✅ validation_report.json: JSON格式正确"
          else
            echo "❌ validation_report.json: JSON格式错误"
            ERROR_COUNT=$((ERROR_COUNT + 1))
          fi
        fi
        
        # 4. 统计摘要
        echo ""
        echo "📋 质量检查摘要:"
        echo "  ├── 错误: $ERROR_COUNT 个"
        echo "  ├── 警告: $WARNING_COUNT 个"
        echo "  └── 文件数: $(ls -1 dist/* 2>/dev/null | wc -l) 个"
        
        if [ "$ERROR_COUNT" -gt 0 ]; then
          echo "⚠️  质量检查发现错误"
        else
          echo "✅ 质量检查通过"
        fi
    
    - name: Step 9 - 发布准备
      run: |
        echo ""
        echo "┌─────────────────────────────────────────────────────┐"
        echo "│            🚀 发布到 GitHub / CDN                   │"
        echo "├─────────────────────────────────────────────────────┤"
        echo "│    • 📄 blacklist.txt (主拦截规则)                 │"
        echo "│    • ✅ whitelist.txt (例外规则)                   │"
        echo "│    • 📊 metadata.json (规则元数据)                 │"
        echo "│    • 🔍 validation_report.json (验证报告)          │"
        echo "│    • 📈 advanced_statistics.md (高级统计)          │"
        echo "│    • 🌐 混合规则源: 包含6+第三方规则              │"
        echo "│    • ⚡ 高级规则: 支持15种规则类型                 │"
        echo "│    • 🛡️  宽松验证: 阈值$VALIDITY_THRESHOLD%       │"
        echo "└─────────────────────────────────────────────────────┘"
        echo ""
        
        # 显示文件详细信息
        echo "📁 生成的文件详情:"
        echo ""
        
        # 检查dist目录是否存在
        if [ -d dist ]; then
          for file in dist/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              lines=$(wc -l < "$file" 2>/dev/null || echo "0")
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              
              # 格式化大小
              if [ "$size" -ge 1048576 ]; then
                human_size="$((size/1048576))MB"
              elif [ "$size" -ge 1024 ]; then
                human_size="$((size/1024))KB"
              else
                human_size="${size}B"
              fi
              
              case "$filename" in
                "blacklist.txt")
                  rules=$(grep -v '^!' "$file" | grep -v '^$' | wc -l 2>/dev/null || echo "0")
                  echo "  📄 $filename"
                  echo "     ├── 规则数: $rules 条"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "whitelist.txt")
                  rules=$(grep -v '^!' "$file" | grep -v '^$' | wc -l 2>/dev/null || echo "0")
                  echo "  ✅ $filename"
                  echo "     ├── 规则数: $rules 条"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "metadata.json")
                  echo "  📊 $filename"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "validation_report.json")
                  echo "  🔍 $filename"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "advanced_statistics.md")
                  echo "  📈 $filename"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                *)
                  echo "  📝 $filename"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
              esac
              echo ""
            fi
          done
        else
          echo "⚠️  dist目录不存在，没有生成文件"
          echo ""
        fi
        
        # 显示目录大小
        if [ -d dist ]; then
          DIST_SIZE=$(du -sh dist 2>/dev/null | cut -f1 || echo "未知")
          echo "📦 总目录大小: $DIST_SIZE"
        else
          echo "📦 dist目录不存在"
        fi
        
        echo ""
        echo "✅ 发布准备完成"
    
    - name: Step 10 - 检查变更
      id: check-changes
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 检查变更                    │"
        echo "│    (自动调度与变更检测)                 │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "🔍 检查Git状态..."
        git status --porcelain
        
        echo ""
        echo "📋 检查文件变更..."
        
        # 添加所有变更
        git add -A
        
        # 检查是否有变更
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          echo "✅ 工作流完成，无需提交"
        else
          echo "🔄 检测到规则变更"
          echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          
          # 显示变更摘要
          echo ""
          echo "📋 变更摘要:"
          git diff --cached --name-only | while read -r file; do
            if echo "$file" | grep -q "^dist/"; then
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              if [ "$size" -ge 1024 ]; then
                size_human="$((size/1024))KB"
              else
                size_human="${size}B"
              fi
              echo "  📄 $file ($size_human)"
            elif echo "$file" | grep -q "^rules/"; then
              echo "  📁 $file"
            elif echo "$file" | grep -q "^scripts/"; then
              echo "  🛠️  $file"
            elif echo "$file" | grep -q "^sources/"; then
              echo "  🌐 $file"
            else
              echo "  📝 $file"
            fi
          done
        fi
    
    - name: Step 11 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📤 提交变更                    │"
        echo "│    (自动提交到GitHub)                   │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 配置Git用户
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 获取统计值（设置默认值）
        BLACK_COUNT="${BLACK_COUNT:-0}"
        WHITE_COUNT="${WHITE_COUNT:-0}"
        TOTAL_COUNT="${TOTAL_COUNT:-0}"
        ADVANCED_COUNT="${ADVANCED_COUNT:-0}"
        
        # 从环境变量获取（如果在之前的步骤中设置了）
        if [ -n "${{ steps.generate-files.outputs.black_rules }}" ]; then
          BLACK_COUNT="${{ steps.generate-files.outputs.black_rules }}"
        fi
        
        if [ -n "${{ steps.generate-files.outputs.white_rules }}" ]; then
          WHITE_COUNT="${{ steps.generate-files.outputs.white_rules }}"
        fi
        
        if [ -n "${{ steps.generate-files.outputs.total_rules }}" ]; then
          TOTAL_COUNT="${{ steps.generate-files.outputs.total_rules }}"
        fi
        
        if [ -n "${{ steps.generate-files.outputs.advanced_rules }}" ]; then
          ADVANCED_COUNT="${{ steps.generate-files.outputs.advanced_rules }}"
        fi
        
        COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
        COMMIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
        
        # 创建详细的提交信息
        {
          echo "🤖 自动更新广告拦截规则 [$COMMIT_TIME]"
          echo ""
          echo "📊 规则统计:"
          echo "- 黑名单: $BLACK_COUNT 条规则"
          echo "- 白名单: $WHITE_COUNT 条规则"
          echo "- 总计: $TOTAL_COUNT 条规则"
          echo "- 高级规则: $ADVANCED_COUNT 条"
          echo ""
          echo "⚡ 高级功能:"
          echo "- 支持15种规则类型分类"
          echo "- 自动检测规则冲突"
          echo "- 语法验证和错误检查"
          echo "- 智能规则合并优化"
          echo "- 宽松验证标准 ($VALIDITY_THRESHOLD%阈值)"
          echo ""
          echo "🌐 规则源更新:"
          echo "- 混合规则源: 包含6+第三方规则集合"
          echo "- 提供更全面的广告拦截覆盖"
          echo "- 高级规则语法支持"
          echo ""
          echo "📈 生成报告:"
          echo "- 详细规则分类分析"
          echo "- 高级统计报告"
          echo "- 验证报告和冲突检测"
          echo ""
          echo "✨ 拦截类型:"
          echo "• 开屏广告拦截"
          echo "• 弹窗广告拦截"
          echo "• 视频广告拦截"
          echo "• 横幅广告拦截"
          echo "• 内联广告拦截"
          echo "• 跟踪器拦截"
          echo "• 恶意软件防护"
          echo "• 隐私保护"
          echo ""
          echo "🛡️ 质量保证:"
          echo "• 宽松验证通过率"
          echo "• 自动冲突检测"
          echo "• 智能去重优化"
          echo "• 文件完整性检查"
          echo ""
          echo "🔗 提交哈希: $COMMIT_HASH"
          echo "🤖 由 GitHub Actions 自动生成"
          echo "⏰ 下次更新: $(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M') (北京时间)"
        } > /tmp/commit_message.txt
        
        # 使用文件内容进行提交
        echo "💾 提交变更..."
        if git commit -F /tmp/commit_message.txt; then
          echo "📤 推送到远程仓库..."
          if git push origin HEAD:main; then
            echo "✅ 变更已提交到 GitHub"
            echo "🔗 查看提交: https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD)"
          else
            echo "❌ 推送失败，请检查权限"
            exit 1
          fi
        else
          echo "❌ 提交失败，可能没有变更需要提交"
          exit 0
        fi
    
    - name: Step 12 - 生成工作流摘要
      if: always()
      run: |
        # 创建摘要文件
        SUMMARY_FILE="$GITHUB_STEP_SUMMARY"
        
        echo "## 📋 AdBlock 规则更新摘要" > "$SUMMARY_FILE"
        echo "" >> "$SUMMARY_FILE"
        
        # 获取时间
        CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
        NEXT_TIME=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')
        
        # 获取统计（直接从文件读取，避免复杂的变量传递）
        if [ -d dist ] && [ -f dist/blacklist.txt ]; then
          BLACK_COUNT=$(grep -v '^!' dist/blacklist.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        else
          BLACK_COUNT=0
        fi
        
        if [ -d dist ] && [ -f dist/whitelist.txt ]; then
          WHITE_COUNT=$(grep -v '^!' dist/whitelist.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        else
          WHITE_COUNT=0
        fi
        
        TOTAL_COUNT=$((BLACK_COUNT + WHITE_COUNT))
        
        if [ -d dist ] && [ -f dist/blacklist.txt ]; then
          ADVANCED_COUNT=$(grep -c -E '#@#|#?#|\$\$' dist/blacklist.txt 2>/dev/null || echo "0")
        else
          ADVANCED_COUNT=0
        fi
        
        # 验证状态
        VALIDATION_EXIT_CODE="0"
        if [ -n "${{ steps.validate-rules.outputs.validation_exit_code }}" ]; then
          VALIDATION_EXIT_CODE="${{ steps.validate-rules.outputs.validation_exit_code }}"
        fi
        
        # 使用heredoc简化输出
        cat >> "$SUMMARY_FILE" << EOF
        
        ### 📊 规则更新摘要
        
        #### 📊 规则统计
        
        | 类型 | 数量 |
        |------|------|
        | 黑名单规则 | $BLACK_COUNT 条 |
        | 白名单规则 | $WHITE_COUNT 条 |
        | 总规则数 | $TOTAL_COUNT 条 |
        | 高级规则 | $ADVANCED_COUNT 条 |
        
        #### 🔍 验证状态
        
        EOF
        
        case "$VALIDATION_EXIT_CODE" in
          0)
            echo "✅ **验证通过** - 所有规则语法检查通过" >> "$SUMMARY_FILE"
            ;;
          1)
            echo "⚠️ **验证警告** - 规则有效性低于${VALIDITY_THRESHOLD}%，但已通过宽松验证" >> "$SUMMARY_FILE"
            ;;
          2)
            echo "❌ **验证失败** - 没有有效规则" >> "$SUMMARY_FILE"
            ;;
          *)
            echo "❓ **验证状态未知** - 退出码: $VALIDATION_EXIT_CODE" >> "$SUMMARY_FILE"
            ;;
        esac
        
        cat >> "$SUMMARY_FILE" << EOF
        
        #### 📁 生成的文件
        
        EOF
        
        if [ -d dist ]; then
          for file in dist/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              
              # 格式化大小
              if [ "$size" -ge 1048576 ]; then
                human_size="$((size/1048576))MB"
              elif [ "$size" -ge 1024 ]; then
                human_size="$((size/1024))KB"
              else
                human_size="${size}B"
              fi
              
              case "$filename" in
                "blacklist.txt")
                  echo "- **blacklist.txt** - 主广告拦截规则 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "whitelist.txt")
                  echo "- **whitelist.txt** - 白名单例外规则 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "metadata.json")
                  echo "- **metadata.json** - 规则元数据 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "validation_report.json")
                  echo "- **validation_report.json** - 验证报告 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "advanced_statistics.md")
                  echo "- **advanced_statistics.md** - 高级统计报告 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
              esac
            fi
          done
        else
          echo "- 没有生成文件" >> "$SUMMARY_FILE"
        fi
        
        cat >> "$SUMMARY_FILE" << EOF
        
        #### 🔄 更新信息
        
        - **更新时间**: $CURRENT_TIME (北京时间)
        - **更新频率**: 每8小时自动更新
        - **下次更新**: $NEXT_TIME (北京时间)
        - **验证标准**: 宽松验证（阈值${VALIDITY_THRESHOLD}%）
        
        #### 📋 步骤执行状态
        
        | 步骤 | 状态 |
        |------|------|
        | 规则源同步 | ✅ |
        | 规则合并 | ✅ |
        EOF
        
        case "$VALIDATION_EXIT_CODE" in
          0)
            echo "| 规则验证 | ✅ |" >> "$SUMMARY_FILE"
            ;;
          1)
            echo "| 规则验证 | ⚠️ |" >> "$SUMMARY_FILE"
            ;;
          *)
            echo "| 规则验证 | ❌ |" >> "$SUMMARY_FILE"
            ;;
        esac
        
        cat >> "$SUMMARY_FILE" << EOF
        | 规则优化 | ✅ |
        | 文件生成 | ✅ |
        | 质量检查 | ✅ |
        | 变更提交 | ✅ |
        
        🤖 由 GitHub Actions 自动执行
        EOF
    
