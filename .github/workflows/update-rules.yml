name: 更新广告拦截规则

on:
  schedule:
    # 每8小时运行一次 (UTC时间)
    - cron: '0 */8 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'sources/**'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Create directories
      run: |
        mkdir -p dist rules/raw
        
    - name: Run update script
      run: |
        python scripts/update_rules.py
    
    - name: Configure Git
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
    
    - name: Commit changes
      if: success()
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "检测到变更，准备提交..."
          
          git add dist/ rules/raw/ || true
          
          BLACKLIST_COUNT=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
          WHITELIST_COUNT=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
          TOTAL_COUNT=$((BLACKLIST_COUNT + WHITELIST_COUNT))
          
          git commit -m "自动更新规则 $(date +'%Y-%m-%d %H:%M:%S')

规则统计:
- 黑名单规则: $BLACKLIST_COUNT
- 白名单规则: $WHITELIST_COUNT
- 总规则数: $TOTAL_COUNT

[skip ci]" || echo "没有变更需要提交"
          
          echo "提交完成"
        else
          echo "没有检测到变更"
        fi
    
    - name: Push changes
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -n "$(git log origin/main..HEAD 2>/dev/null)" ]; then
          echo "推送更改..."
          git pull --rebase origin main || echo "拉取失败"
          git push origin HEAD:main
          echo "推送完成"
        fi
