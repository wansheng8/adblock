name: Update AdBlock Rules

on:
  workflow_dispatch:  # 手动触发
  schedule:
    # 每天运行3次（UTC时间0:00, 8:00, 16:00）
    - cron: '0 0,8,16 * * *'
  push:
    branches: [ main ]
    paths:
      - 'sources/**'
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write  # 允许推送代码到仓库

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # 超时时间
    
    steps:
    # 步骤1: 检出代码
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    # 步骤2: 设置Python环境
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    # 步骤3: 安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    # 步骤4: 创建必要目录
    - name: Create directories
      run: |
        mkdir -p dist
        mkdir -p rules/raw
        mkdir -p rules/custom
        chmod +x scripts/*.py 2>/dev/null || true
        
    # 步骤5: 运行规则更新器
    - name: Run rule updater
      run: |
        echo "Starting rule update..."
        python scripts/update_rules.py
        
    # 步骤6: 格式化规则（如果存在）
    - name: Format rules
      run: |
        if [ -f "scripts/format_rules.py" ]; then
          echo "Formatting rules..."
          python scripts/format_rules.py
        else
          echo "Format script not found, skipping"
        fi
        
    # 步骤7: 检查是否有变更
    - name: Check for changes
      id: check-changes
      run: |
        echo "Checking for changes..."
        
        # 配置Git用户
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 检查是否有变更
        git add -A
        if git diff --cached --quiet; then
          echo "changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected"
        else
          echo "changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected"
          
          # 获取规则统计
          DNS_COUNT=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          HOSTS_COUNT=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          FILTER_COUNT=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          
          # 创建提交信息
          COMMIT_MESSAGE="🤖 Auto-update adblock rules $(date +'%Y-%m-%d %H:%M')
          
📊 Rules:
- DNS: $DNS_COUNT domains
- Hosts: $HOSTS_COUNT entries  
- Filter: $FILTER_COUNT rules
- Total: $((DNS_COUNT + HOSTS_COUNT + FILTER_COUNT)) rules

🎯 Adblock syntax with ping verification
🔄 Auto-updated by GitHub Actions"
          
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi
        
    # 步骤8: 提交并推送变更
    - name: Commit and push changes
      if: steps.check-changes.outputs.changes == 'true'
      run: |
        echo "Committing and pushing changes..."
        git commit -m "${{ steps.check-changes.outputs.commit_message }}"
        git push
