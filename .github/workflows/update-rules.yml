name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,8,16 * * *'
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml
    
    - name: Create directories
      run: |
        mkdir -p dist
        mkdir -p rules/raw
    
    - name: Step 1 - 规则源同步
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 规则源同步                  │"
        echo "│       (广告拦截源)                 │"
        echo "└─────────────────────────────────────────┘"
        python scripts/update_rules.py
    
    - name: Step 2 - 规则验证器
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔍 规则验证器                  │"
        echo "│         (语法检查/格式验证)             │"
        echo "└─────────────────────────────────────────┘"
        python scripts/validate_rules.py
    
    - name: Step 3 - 规则优化器
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ⚡ 规则优化器                  │"
        echo "│        (去重/分类/性能优化)             │"
        echo "└─────────────────────────────────────────┘"
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
        else
          echo "跳过规则优化"
        fi
    
    - name: Step 4 - 生成最终文件
      id: generate-files
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 生成最终文件                │"
        echo "│       (黑白名单/元数据/hosts)          │"
        echo "└─────────────────────────────────────────┘"
        
        # 确保文件存在
        touch dist/blacklist.txt dist/whitelist.txt
        
        # 统计规则数量
        black_rules=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
        white_rules=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
        
        echo "black_rules=$black_rules" >> $GITHUB_OUTPUT
        echo "white_rules=$white_rules" >> $GITHUB_OUTPUT
        
        echo "📊 规则统计:"
        echo "├── 黑名单: $black_rules 条规则"
        echo "└── 白名单: $white_rules 条规则"
    
    - name: Step 5 - 生成统计报告
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📈 生成统计报告                │"
        echo "│        (详细规则分析与报告)             │"
        echo "└─────────────────────────────────────────┘"
        
        # 使用简单的shell命令生成统计报告，避免复杂语法
        echo "# 📊 AdBlock 规则统计报告" > dist/statistics.md
        echo "" >> dist/statistics.md
        echo "> 本报告由 GitHub Actions 自动生成" >> dist/statistics.md
        echo "" >> dist/statistics.md
        
        # 获取当前时间
        CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
        
        # 统计规则数量
        if [ -f dist/blacklist.txt ]; then
          BLACK_COUNT=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo "0")
        else
          BLACK_COUNT=0
        fi
        
        if [ -f dist/whitelist.txt ]; then
          WHITE_COUNT=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo "0")
        else
          WHITE_COUNT=0
        fi
        
        TOTAL_COUNT=$((BLACK_COUNT + WHITE_COUNT))
        
        # 添加总体统计
        echo "## 📈 总体统计" >> dist/statistics.md
        echo "" >> dist/statistics.md
        echo "| 指标 | 数量 | 说明 |" >> dist/statistics.md
        echo "|------|------|------|" >> dist/statistics.md
        echo "| 黑名单规则 | $BLACK_COUNT 条 | 拦截广告和恶意内容的规则 |" >> dist/statistics.md
        echo "| 白名单规则 | $WHITE_COUNT 条 | 避免误拦截的例外规则 |" >> dist/statistics.md
        echo "| 总规则数 | $TOTAL_COUNT 条 | 所有规则总和 |" >> dist/statistics.md
        echo "| 生成时间 | $CURRENT_TIME | 北京时间 |" >> dist/statistics.md
        echo "" >> dist/statistics.md
        
        # 添加更新时间信息
        NEXT_TIME=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')
        echo "## 🔄 更新信息" >> dist/statistics.md
        echo "" >> dist/statistics.md
        echo "- **最后更新时间**: $CURRENT_TIME (北京时间)" >> dist/statistics.md
        echo "- **更新频率**: 每8小时自动更新" >> dist/statistics.md
        echo "- **下次更新时间**: $NEXT_TIME (北京时间)" >> dist/statistics.md
        echo "- **数据来源**: 23个主流广告规则源" >> dist/statistics.md
        echo "" >> dist/statistics.md
        
        # 添加文件列表
        echo "## 📁 文件列表" >> dist/statistics.md
        echo "" >> dist/statistics.md
        echo "| 文件名 | 描述 |" >> dist/statistics.md
        echo "|--------|------|" >> dist/statistics.md
        echo "| blacklist.txt | 主广告拦截规则 |" >> dist/statistics.md
        echo "| whitelist.txt | 白名单例外规则 |" >> dist/statistics.md
        echo "| metadata.json | 规则元数据 |" >> dist/statistics.md
        echo "| statistics.md | 统计报告 |" >> dist/statistics.md
        echo "" >> dist/statistics.md
        
        echo "✅ 统计报告已生成: dist/statistics.md"
    
    - name: Step 6 - 发布准备
      run: |
        echo ""
        echo "┌─────────────────────────────────────────────────────┐"
        echo "│            🚀 发布到 GitHub / CDN                   │"
        echo "├─────────────────────────────────────────────────────┤"
        echo "│    • 📄 blacklist.txt (主拦截规则)                 │"
        echo "│    • ✅ whitelist.txt (例外规则)                   │"
        echo "│    • 📊 metadata.json (规则元数据)                 │"
        echo "│    • 📈 statistics.md (统计报告)                   │"
        echo "└─────────────────────────────────────────────────────┘"
        
        # 显示文件大小
        echo "📁 文件大小:"
        ls -lh dist/*.txt dist/*.json dist/*.md 2>/dev/null || echo "dist目录中没有文件"
    
    - name: Step 7 - 检查变更
      id: check-changes
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 GitHub Actions               │"
        echo "│        (自动调度与变更检测)             │"
        echo "└─────────────────────────────────────────┘"
        
        git add -A
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> $GITHUB_OUTPUT
        else
          echo "🔄 检测到规则变更"
          echo "changes_detected=true" >> $GITHUB_OUTPUT
        fi
    
    - name: Step 8 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 获取统计值
        BLACK_COUNT=${{ steps.generate-files.outputs.black_rules || 0 }}
        WHITE_COUNT=${{ steps.generate-files.outputs.white_rules || 0 }}
        COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
        
        # 使用纯Shell创建提交信息
        {
          echo "🤖 自动更新广告拦截规则 [$COMMIT_TIME]"
          echo ""
          echo "📊 规则统计:"
          echo "- 黑名单: $BLACK_COUNT 条规则"
          echo "- 白名单: $WHITE_COUNT 条规则"
          echo ""
          echo "📈 新增统计报告:"
          echo "- 详细规则分类分析"
          echo "- 广告类型占比统计"
          echo "- 完整使用说明文档"
          echo ""
          echo "✨ 拦截类型:"
          echo "• 开屏广告拦截"
          echo "• 弹窗广告拦截"
          echo "• 视频广告拦截"
          echo "• 横幅广告拦截"
          echo "• 内联广告拦截"
          echo ""
          echo "🛡️ 其他防护:"
          echo "• 跟踪器拦截"
          echo "• 恶意软件防护"
          echo "• 隐私保护"
          echo ""
          echo "🤖 由 GitHub Actions 自动生成"
        } > /tmp/commit_message.txt
        
        # 使用文件内容进行提交
        git commit -F /tmp/commit_message.txt
        git push
        
        echo "✅ 变更已提交到 GitHub"
    
    - name: Step 9 - 工作流完成
      if: always()
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ✅ 工作流执行完成              │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        echo "📅 运行时间设置 (北京时间):"
        echo "  每天 08:00, 16:00, 00:00 (次日)"
        echo ""
        echo "📊 生成文件:"
        echo "  • dist/blacklist.txt - 主拦截规则"
        echo "  • dist/whitelist.txt - 白名单规则"
        echo "  • dist/metadata.json - 规则元数据"
        echo "  • dist/statistics.md - 统计报告"
        echo ""
        echo "🕐 下次自动运行:"
        TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-d %H:%M (北京时间)'
