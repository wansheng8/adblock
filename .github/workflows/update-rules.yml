name: Update AdBlock Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */8 * * *'  # 每8小时运行一次
  push:
    branches: [ main ]

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests
    
    - name: Run updater
      run: |
        mkdir -p dist
        python scripts/update_rules.py
    
    - name: Commit changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git diff --cached --quiet || git commit -m "Update rules $(date +'%Y-%m-%d %H:%M')"
        git push
