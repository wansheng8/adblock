name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:    # 手动触发
  schedule:
    - cron: '0 */8 * * *'  # 每8小时运行一次 (UTC 00:00, 08:00, 16:00)
  push:
    branches: [ main ]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        cd scripts
        pip install -r requirements.txt
    
    # 第一步：规则源同步 (12+个源)
    - name: Step 1 - 同步规则源
      run: |
        echo "┌─────────────────┐"
        echo "│   规则源同步    │"
        echo "│  (12+个源)      │"
        echo "└─────────────────┘"
        echo "开始同步规则源..."
        python scripts/update_rules.py --step sync
      continue-on-error: true
    
    # 第二步：规则处理引擎 (合并/去重)
    - name: Step 2 - 规则处理引擎
      run: |
        echo "┌─────────────────┐"
        echo "│   规则处理引擎   │"
        echo "│  (合并/去重)    │"
        echo "└─────────────────┘"
        python scripts/update_rules.py --step process
    
    # 第三步：规则验证器 (语法检查)
    - name: Step 3 - 规则验证器
      run: |
        echo "┌─────────────────┐"
        echo "│   规则验证器    │"
        echo "│  (语法检查)    │"
        echo "└─────────────────┘"
        python scripts/validate_rules.py
    
    # 第四步：规则优化器 (性能优化)
    - name: Step 4 - 规则优化器
      run: |
        echo "┌─────────────────┐"
        echo "│   规则优化器    │"
        echo "│  (性能优化)    │"
        echo "└─────────────────┘"
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py --optimize
        else
          echo "跳过规则优化 (format_rules.py 未找到)"
        fi
    
    # 第五步：规则生成器 (格式转换)
    - name: Step 5 - 规则生成器
      run: |
        echo "┌─────────────────┐"
        echo "│   规则生成器    │"
        echo "│  (格式转换)     │"
        echo "└─────────────────┘"
        python scripts/update_rules.py --step generate
    
    # 第六步：发布准备
    - name: Step 6 - 发布准备
      run: |
        echo "┌─────────────────────────────────────────────────┐"
        echo "│             发布到 GitHub / CDN                 │"
        echo "│    • blacklist.txt (主规则)                     │"
        echo "│    • whitelist.txt (例外规则)                   │"
        echo "│    • metadata.json (元数据)                     │"
        echo "└─────────────────────────────────────────────────┘"
        
        # 统计信息
        if [ -f dist/metadata.json ]; then
          echo "规则统计:"
          cat dist/metadata.json | python -c "import sys,json; data=json.load(sys.stdin); print(f'黑名单: {data[\"blacklist_rules\"]} 条'); print(f'白名单: {data[\"whitelist_rules\"]} 条'); print(f'总计: {data[\"total_rules\"]} 条')"
        fi
        
        # 文件大小检查
        echo -e "\n文件大小:"
        ls -lh dist/*.txt | awk '{print $9 ": " $5}'
    
    # 第七步：检查变更并提交
    - name: Step 7 - 检查变更
      id: check-changes
      run: |
        echo "┌─────────────────┐"
        echo "│   GitHub Actions │"
        echo "│  (自动调度)      │"
        echo "└─────────────────┘"
        
        git add -A
        if git diff --cached --quiet; then
          echo "changes_detected=false" >> $GITHUB_OUTPUT
          echo "没有检测到变更，跳过提交"
        else
          echo "changes_detected=true" >> $GITHUB_OUTPUT
          
          # 统计变更
          blacklist_lines=$(wc -l < dist/blacklist.txt 2>/dev/null || echo "0")
          whitelist_lines=$(wc -l < dist/whitelist.txt 2>/dev/null || echo "0")
          echo "blacklist_lines=$blacklist_lines" >> $GITHUB_OUTPUT
          echo "whitelist_lines=$whitelist_lines" >> $GITHUB_OUTPUT
          
          echo "检测到规则变更:"
          git diff --cached --name-only | grep -E '\.(txt|json)$' || echo "无规则文件变更"
        fi
    
    # 第八步：提交到 GitHub
    - name: Step 8 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # 生成提交信息
        commit_time=$(date +'%Y-%m-%d %H:%M')
        commit_msg="🤖 自动更新规则 [$commit_time]"
        
        # 添加统计信息
        if [ -f dist/metadata.json ]; then
          stats=$(cat dist/metadata.json | python -c "import sys,json; data=json.load(sys.stdin); print(f'黑名单: {data[\"blacklist_rules\"]} 条, 白名单: {data[\"whitelist_rules\"]} 条')")
          commit_msg="$commit_msg\n\n📊 $stats"
        fi
        
        # 提交
        git commit -F- <<EOF
$commit_msg

由 GitHub Actions 自动生成
更新时间: $commit_time
规则文件已更新
EOF
        
        # 推送
        git push
        
        echo "✅ 规则已更新并推送到 GitHub"
    
    # 工作流完成通知
    - name: 工作流完成
      if: always()
      run: |
        echo "========================================"
        echo "AdBlock 规则更新工作流执行完成"
        echo "========================================"
        echo "下次自动运行时间: 每 8 小时"
        echo "手动运行: 在 GitHub Actions 页面点击 Run workflow"
