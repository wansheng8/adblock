name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,8,16 * * *'  # 北京时间 08:00, 16:00, 00:00 (次日)
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'
      - 'sources/gz.txt'
      - 'rules/custom/**'
      - 'rules/whitelist_custom.txt'
      - '.github/workflows/update-rules.yml'

env:
  PYTHON_VERSION: '3.11'
  VALIDITY_THRESHOLD: '90'
  WORKFLOW_NAME: 'AdBlock Rules Auto-Updater - 新语法版'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        echo "📦 安装依赖..."
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
        echo "✅ 依赖安装完成"
    
    - name: Step 1 - 环境准备
      id: setup
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 环境准备                    │"
        echo "│    (创建目录/检查配置)                  │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 清理并重新创建目录结构
        echo "🧹 清理旧规则文件..."
        
        # 清空临时和中间目录
        if [ -d dist ]; then
          echo "  📁 清空 dist 目录..."
          rm -rf dist/*
        fi
        
        if [ -d rules/raw ]; then
          echo "  📁 清空 rules/raw 目录..."
          rm -rf rules/raw/*
        fi
        
        if [ -d rules/processed ]; then
          echo "  📁 清空 rules/processed 目录..."
          rm -rf rules/processed/*
        fi
        
        # 创建必要目录（如果不存在）
        echo "📁 创建目录结构..."
        mkdir -p dist rules/raw rules/processed rules/custom
        
        # 检查重要文件
        echo "🔍 检查重要文件..."
        
        if [ ! -f "sources/sources.json" ]; then
          echo "❌ sources/sources.json 文件不存在"
          exit 1
        else
          echo "  ✅ sources/sources.json"
        fi
        
        if [ ! -f "scripts/update_rules.py" ]; then
          echo "❌ scripts/update_rules.py 文件不存在"
          exit 1
        else
          echo "  ✅ scripts/update_rules.py"
        fi
        
        # 检查 gz.txt 文件
        if [ -f "sources/gz.txt" ]; then
          size=$(wc -c < "sources/gz.txt" 2>/dev/null || echo "0")
          if [ "$size" -gt 0 ]; then
            echo "  ✅ sources/gz.txt (额外规则源)"
          else
            echo "  ⚠️  sources/gz.txt 为空"
          fi
        else
          echo "  ⚠️  sources/gz.txt 文件不存在，跳过额外规则源"
        fi
        
        # 检查Python脚本权限
        echo "🔧 设置脚本权限..."
        chmod +x scripts/*.py 2>/dev/null || true
        
        echo "✅ 环境准备完成"
    
    - name: Step 2 - 规则源同步（三层规则）
      id: update-rules
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 规则源同步                  │"
        echo "│    (三层规则：DNS/Hosts/浏览器)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 确保 raw 目录是干净的
        echo "🧹 确保规则源目录干净..."
        if [ -d rules/raw ]; then
          find rules/raw -type f -name "*.txt" -delete 2>/dev/null || true
          find rules/raw -type f -name "*.json" -delete 2>/dev/null || true
        fi
        
        echo "📊 开始规则源同步..."
        START_TIME=$(date +%s)
        
        # 运行规则更新脚本
        if [ -f scripts/update_rules.py ]; then
          python scripts/update_rules.py
          UPDATE_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $UPDATE_STATUS -eq 0 ]; then
            echo "✅ 规则源同步成功 (耗时 ${DURATION}秒)"
            echo "update_success=true" >> "$GITHUB_OUTPUT"
          elif [ $UPDATE_STATUS -eq 1 ]; then
            echo "⚠️  规则源同步部分失败，继续执行 (耗时 ${DURATION}秒)"
            echo "update_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "❌ 规则源同步失败，退出码: $UPDATE_STATUS (耗时 ${DURATION}秒)"
            echo "update_success=false" >> "$GITHUB_OUTPUT"
            exit $UPDATE_STATUS
          fi
        else
          echo "❌ 规则更新脚本不存在"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        # 显示下载的规则文件
        echo "📄 下载的规则文件:"
        if [ -d rules/raw ]; then
          RAW_FILES=$(find rules/raw -type f -name "*.txt" | wc -l)
          echo "  在 rules/raw 中找到 $RAW_FILES 个规则文件"
        else
          echo "  ⚠️  rules/raw 目录不存在"
        fi
        
        # 检查生成的三层规则文件
        echo "📄 检查生成的三层规则文件..."
        
        if [ -f dist/dns.txt ] && [ -s dist/dns.txt ]; then
          DNS_SIZE=$(wc -c < dist/dns.txt)
          DNS_RULES=$(grep -v '^#' dist/dns.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "  ✅ dns.txt: $DNS_RULES 条规则 ($((DNS_SIZE/1024))KB)"
        else
          echo "  ❌ dns.txt 生成失败"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        if [ -f dist/hosts.txt ] && [ -s dist/hosts.txt ]; then
          HOSTS_SIZE=$(wc -c < dist/hosts.txt)
          HOSTS_RULES=$(grep -v '^#' dist/hosts.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "  ✅ hosts.txt: $HOSTS_RULES 条规则 ($((HOSTS_SIZE/1024))KB)"
        else
          echo "  ❌ hosts.txt 生成失败"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        if [ -f dist/filter.txt ] && [ -s dist/filter.txt ]; then
          FILTER_SIZE=$(wc -c < dist/filter.txt)
          FILTER_RULES=$(grep -v '^!' dist/filter.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
          echo "  ✅ filter.txt: $FILTER_RULES 条规则 ($((FILTER_SIZE/1024))KB)"
        else
          echo "  ❌ filter.txt 生成失败"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
    
    - name: Step 3 - 规则合并（包含自定义规则）
      id: merge-rules
      if: steps.update-rules.outputs.update_success == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 规则合并                    │"
        echo "│    (合并自定义规则/优化去重)            │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📂 检查自定义规则..."
        CUSTOM_FOUND=false
        
        # 检查 rules/custom 目录
        if [ -d "rules/custom" ]; then
          CUSTOM_FILES=$(find rules/custom -name "*.txt" -type f 2>/dev/null | wc -l)
          if [ $CUSTOM_FILES -gt 0 ]; then
            echo "📄 在 rules/custom 中找到 $CUSTOM_FILES 个自定义规则文件"
            CUSTOM_FOUND=true
          fi
        fi
        
        if [ "$CUSTOM_FOUND" = false ]; then
          echo "ℹ️  未找到自定义规则文件，跳过合并步骤"
          echo "skip_merge=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        echo "📄 开始合并自定义规则..."
        START_TIME=$(date +%s)
        
        # 清理 processed 目录
        if [ -d rules/processed ]; then
          echo "🧹 清理处理过的规则目录..."
          find rules/processed -type f -delete 2>/dev/null || true
        fi
        
        # 运行规则合并脚本
        if [ -f scripts/merge_rules.py ]; then
          # 运行合并脚本
          python scripts/merge_rules.py
          MERGE_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $MERGE_STATUS -eq 0 ]; then
            echo "✅ 规则合并成功 (耗时 ${DURATION}秒)"
            echo "skip_merge=false" >> "$GITHUB_OUTPUT"
          else
            echo "⚠️  规则合并过程出现警告 (耗时 ${DURATION}秒)"
            echo "skip_merge=false" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "ℹ️  规则合并脚本不存在，跳过此步骤"
          echo "skip_merge=true" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Step 4 - 规则验证器（新语法版）
      id: validate-rules
      if: steps.update-rules.outputs.update_success == 'true'
      continue-on-error: true
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔍 规则验证器                  │"
        echo "│    (三层规则语法验证)                   │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则验证..."
        START_TIME=$(date +%s)
        
        if [ ! -f scripts/validate_rules.py ]; then
          echo "❌ 规则验证脚本不存在"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=3" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        # 检查三层规则文件是否存在
        if [ ! -f dist/dns.txt ] || [ ! -s dist/dns.txt ]; then
          echo "❌ DNS规则文件不存在或为空"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=4" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        if [ ! -f dist/hosts.txt ] || [ ! -s dist/hosts.txt ]; then
          echo "❌ Hosts规则文件不存在或为空"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=4" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        if [ ! -f dist/filter.txt ] || [ ! -s dist/filter.txt ]; then
          echo "❌ 浏览器规则文件不存在或为空"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=4" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        # 运行验证脚本
        python scripts/validate_rules.py
        VALIDATION_STATUS=$?
        
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        
        # 根据退出码判断验证结果
        if [ $VALIDATION_STATUS -eq 0 ]; then
          echo "✅ 规则验证通过 (耗时 ${DURATION}秒)"
          echo "validation_passed=true" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=0" >> "$GITHUB_OUTPUT"
        elif [ $VALIDATION_STATUS -eq 1 ]; then
          echo "⚠️  规则验证警告，有效性低于$VALIDITY_THRESHOLD% (耗时 ${DURATION}秒)"
          echo "validation_passed=true" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=1" >> "$GITHUB_OUTPUT"
        elif [ $VALIDATION_STATUS -eq 2 ]; then
          echo "❌ 规则验证失败，没有有效规则 (耗时 ${DURATION}秒)"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=2" >> "$GITHUB_OUTPUT"
        else
          echo "⚠️  规则验证过程出现未知错误，退出码: $VALIDATION_STATUS (耗时 ${DURATION}秒)"
          echo "validation_passed=false" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=$VALIDATION_STATUS" >> "$GITHUB_OUTPUT"
        fi
        
        # 验证步骤不阻塞后续流程
        exit 0
    
    - name: Step 5 - 规则优化器（新语法版）
      if: steps.validate-rules.outputs.validation_passed == 'true' || steps.validate-rules.outputs.validation_exit_code == '1'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ⚡ 规则优化器                  │"
        echo "│ (去重/分类/性能优化/高级语法处理)       │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "📊 开始规则优化..."
        START_TIME=$(date +%s)
        
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
          FORMAT_STATUS=$?
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ $FORMAT_STATUS -eq 0 ]; then
            echo "✅ 规则优化成功 (耗时 ${DURATION}秒)"
          else
            echo "⚠️  规则优化过程出现警告 (耗时 ${DURATION}秒)"
          fi
        else
          echo "ℹ️  规则优化脚本不存在，跳过此步骤"
        fi
    
    - name: Step 6 - 生成最终文件（三层规则统计）
      id: generate-files
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 生成最终文件                │"
        echo "│  (统计规则/计算元数据/生成报告)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 确保文件存在
        touch dist/dns.txt dist/hosts.txt dist/filter.txt
        touch dist/metadata.json dist/validation_report.json 2>/dev/null || true
        
        # 初始化变量（避免空值）
        DNS_RULES=0
        DNS_LINES=0
        DNS_SIZE=0
        HOSTS_RULES=0
        HOSTS_LINES=0
        HOSTS_SIZE=0
        FILTER_RULES=0
        FILTER_LINES=0
        FILTER_SIZE=0
        TOTAL_RULES=0
        TOTAL_SIZE=0
        DOMAIN_RULES=0
        ELEMENT_RULES=0
        EXCEPTION_RULES=0
        ADVANCED_RULES=0
        
        # 统计规则数量
        echo "📊 统计三层规则数量..."
        
        if [ -f dist/dns.txt ] && [ -s dist/dns.txt ]; then
          DNS_RULES=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' 2>/dev/null | wc -l 2>/dev/null || echo "0")
          DNS_LINES=$(wc -l < dist/dns.txt 2>/dev/null || echo "0")
          DNS_SIZE=$(wc -c < dist/dns.txt 2>/dev/null || echo "0")
          # 清理变量：去除空格和换行符
          DNS_RULES=${DNS_RULES//[^0-9]/}
          DNS_LINES=${DNS_LINES//[^0-9]/}
          DNS_SIZE=${DNS_SIZE//[^0-9]/}
          echo "📄 DNS规则统计:"
          echo "  ├── 有效规则: $DNS_RULES 条"
          echo "  ├── 总行数: $DNS_LINES 行"
          echo "  └── 文件大小: $((DNS_SIZE/1024))KB"
        else
          echo "❌ DNS规则文件不存在或为空"
        fi
        
        if [ -f dist/hosts.txt ] && [ -s dist/hosts.txt ]; then
          HOSTS_RULES=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' 2>/dev/null | wc -l 2>/dev/null || echo "0")
          HOSTS_LINES=$(wc -l < dist/hosts.txt 2>/dev/null || echo "0")
          HOSTS_SIZE=$(wc -c < dist/hosts.txt 2>/dev/null || echo "0")
          # 清理变量
          HOSTS_RULES=${HOSTS_RULES//[^0-9]/}
          HOSTS_LINES=${HOSTS_LINES//[^0-9]/}
          HOSTS_SIZE=${HOSTS_SIZE//[^0-9]/}
          echo "📄 Hosts规则统计:"
          echo "  ├── 有效规则: $HOSTS_RULES 条"
          echo "  ├── 总行数: $HOSTS_LINES 行"
          echo "  └── 文件大小: $((HOSTS_SIZE/1024))KB"
        else
          echo "❌ Hosts规则文件不存在或为空"
        fi
        
        if [ -f dist/filter.txt ] && [ -s dist/filter.txt ]; then
          FILTER_RULES=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' 2>/dev/null | wc -l 2>/dev/null || echo "0")
          FILTER_LINES=$(wc -l < dist/filter.txt 2>/dev/null || echo "0")
          FILTER_SIZE=$(wc -c < dist/filter.txt 2>/dev/null || echo "0")
          # 清理变量
          FILTER_RULES=${FILTER_RULES//[^0-9]/}
          FILTER_LINES=${FILTER_LINES//[^0-9]/}
          FILTER_SIZE=${FILTER_SIZE//[^0-9]/}
          echo "📄 浏览器规则统计:"
          echo "  ├── 有效规则: $FILTER_RULES 条"
          echo "  ├── 总行数: $FILTER_LINES 行"
          echo "  └── 文件大小: $((FILTER_SIZE/1024))KB"
        else
          echo "❌ 浏览器规则文件不存在或为空"
        fi
        
        TOTAL_RULES=$((DNS_RULES + HOSTS_RULES + FILTER_RULES))
        TOTAL_SIZE=$((DNS_SIZE + HOSTS_SIZE + FILTER_SIZE))
        
        # 浏览器规则分类统计
        if [ -f dist/filter.txt ] && [ -s dist/filter.txt ]; then
          echo "⚡ 浏览器规则分类统计..."
          DOMAIN_RULES=$(grep -c '^||' dist/filter.txt 2>/dev/null || echo "0")
          ELEMENT_RULES=$(grep -c '^##' dist/filter.txt 2>/dev/null || echo "0")
          EXCEPTION_RULES=$(grep -c '^@@' dist/filter.txt 2>/dev/null || echo "0")
          ADVANCED_RULES=$(grep -c '\$' dist/filter.txt 2>/dev/null || echo "0")
          
          # 清理变量
          DOMAIN_RULES=${DOMAIN_RULES//[^0-9]/}
          ELEMENT_RULES=${ELEMENT_RULES//[^0-9]/}
          EXCEPTION_RULES=${EXCEPTION_RULES//[^0-9]/}
          ADVANCED_RULES=${ADVANCED_RULES//[^0-9]/}
          
          echo "  ├── 域名拦截规则: $DOMAIN_RULES 条"
          echo "  ├── 元素隐藏规则: $ELEMENT_RULES 条"
          echo "  ├── 例外规则: $EXCEPTION_RULES 条"
          echo "  └── 高级规则: $ADVANCED_RULES 条"
        fi
        
        # 确保变量都是数字（设置默认值）
        DNS_RULES=${DNS_RULES:-0}
        HOSTS_RULES=${HOSTS_RULES:-0}
        FILTER_RULES=${FILTER_RULES:-0}
        TOTAL_RULES=${TOTAL_RULES:-0}
        DNS_SIZE=${DNS_SIZE:-0}
        HOSTS_SIZE=${HOSTS_SIZE:-0}
        FILTER_SIZE=${FILTER_SIZE:-0}
        TOTAL_SIZE=${TOTAL_SIZE:-0}
        DOMAIN_RULES=${DOMAIN_RULES:-0}
        ELEMENT_RULES=${ELEMENT_RULES:-0}
        EXCEPTION_RULES=${EXCEPTION_RULES:-0}
        ADVANCED_RULES=${ADVANCED_RULES:-0}
        
        # 调试：显示所有变量的值
        echo ""
        echo "🔍 调试信息 - 变量值:"
        echo "DNS_RULES=$DNS_RULES"
        echo "HOSTS_RULES=$HOSTS_RULES"
        echo "FILTER_RULES=$FILTER_RULES"
        echo "TOTAL_RULES=$TOTAL_RULES"
        echo "DOMAIN_RULES=$DOMAIN_RULES"
        echo "ELEMENT_RULES=$ELEMENT_RULES"
        echo "EXCEPTION_RULES=$EXCEPTION_RULES"
        echo "ADVANCED_RULES=$ADVANCED_RULES"
        echo "DNS_SIZE=$DNS_SIZE"
        echo "HOSTS_SIZE=$HOSTS_SIZE"
        echo "FILTER_SIZE=$FILTER_SIZE"
        echo "TOTAL_SIZE=$TOTAL_SIZE"
        
        # 输出到环境变量
        {
          echo "dns_rules=${DNS_RULES}"
          echo "hosts_rules=${HOSTS_RULES}"
          echo "filter_rules=${FILTER_RULES}"
          echo "total_rules=${TOTAL_RULES}"
          echo "domain_rules=${DOMAIN_RULES}"
          echo "element_rules=${ELEMENT_RULES}"
          echo "exception_rules=${EXCEPTION_RULES}"
          echo "advanced_rules=${ADVANCED_RULES}"
          echo "dns_size=${DNS_SIZE}"
          echo "hosts_size=${HOSTS_SIZE}"
          echo "filter_size=${FILTER_SIZE}"
          echo "total_size=${TOTAL_SIZE}"
        } >> "$GITHUB_OUTPUT"
        
        echo "✅ 文件统计完成"
    
    - name: Step 7 - 生成高级统计报告
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📈 生成高级统计报告            │"
        echo "│    (详细规则分析/分类统计/趋势)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 创建报告文件
        echo "📄 创建高级统计报告..."
        
        # 获取时间
        CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
        NEXT_TIME=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')
        
        # 从环境变量获取统计信息
        DNS_RULES="${DNS_RULES:-0}"
        HOSTS_RULES="${HOSTS_RULES:-0}"
        FILTER_RULES="${FILTER_RULES:-0}"
        TOTAL_RULES="${TOTAL_RULES:-0}"
        DOMAIN_RULES="${DOMAIN_RULES:-0}"
        ELEMENT_RULES="${ELEMENT_RULES:-0}"
        EXCEPTION_RULES="${EXCEPTION_RULES:-0}"
        ADVANCED_RULES="${ADVANCED_RULES:-0}"
        
        # 文件大小格式化
        format_size() {
          local bytes=$1
          if [ "$bytes" -ge 1073741824 ]; then
            echo "$((bytes/1073741824))GB"
          elif [ "$bytes" -ge 1048576 ]; then
            echo "$((bytes/1048576))MB"
          elif [ "$bytes" -ge 1024 ]; then
            echo "$((bytes/1024))KB"
          else
            echo "${bytes}B"
          fi
        }
        
        # 验证状态
        VALIDATION_EXIT_CODE="0"
        if [ -n "${{ steps.validate-rules.outputs.validation_exit_code }}" ]; then
          VALIDATION_EXIT_CODE="${{ steps.validate-rules.outputs.validation_exit_code }}"
        fi
        
        # 创建报告
        REPORT_FILE="dist/advanced_statistics.md"
        {
          echo "# 📊 AdBlock 规则高级统计报告"
          echo ""
          echo "> 本报告由 GitHub Actions 自动生成，更新时间: $CURRENT_TIME"
          echo ""
          
          echo "## 📈 三层规则统计"
          echo ""
          echo "| 规则类型 | 数量 | 文件 | 用途 |"
          echo "|----------|------|------|------|"
          echo "| DNS规则 | $DNS_RULES 条 | dns.txt | 用于AdGuard Home/DNS服务 |"
          echo "| Hosts规则 | $HOSTS_RULES 条 | hosts.txt | 用于系统hosts文件 |"
          echo "| 浏览器规则 | $FILTER_RULES 条 | filter.txt | 用于uBlock Origin/AdBlock |"
          echo "| **总计** | **$TOTAL_RULES 条** | - | 所有规则总和 |"
          echo ""
          
          echo "## 🎯 浏览器规则分类"
          echo ""
          echo "| 规则类型 | 数量 | 描述 |"
          echo "|----------|------|------|"
          echo "| 域名拦截规则 | $DOMAIN_RULES 条 | 拦截特定域名的请求 |"
          echo "| 元素隐藏规则 | $ELEMENT_RULES 条 | 隐藏页面广告元素 |"
          echo "| 例外规则 | $EXCEPTION_RULES 条 | 允许特定内容 |"
          echo "| 高级规则 | $ADVANCED_RULES 条 | 带修饰符的复杂规则 |"
          echo ""
          
          echo "## 🔍 验证状态"
          echo ""
          
          case "$VALIDATION_EXIT_CODE" in
            0)
              echo "✅ **验证通过** - 所有规则语法检查通过"
              ;;
            1)
              echo "⚠️ **验证警告** - 规则有效性低于${VALIDITY_THRESHOLD}%，但已通过严格验证"
              ;;
            2)
              echo "❌ **验证失败** - 没有有效规则"
              ;;
            *)
              echo "❓ **验证状态未知** - 退出码: $VALIDATION_EXIT_CODE"
              ;;
          esac
          
          echo ""
          
          echo "## 🌐 规则来源"
          echo ""
          echo "### 主要规则源"
          echo "- sources/sources.json (主规则源配置)"
          echo "- sources/gz.txt (额外规则源)"
          echo "- rules/custom/ (自定义规则目录)"
          echo ""
          
          echo "### 新语法说明"
          echo "本项目使用新的三层规则语法："
          echo "- **DNS规则** (dns.txt): 纯域名格式，用于DNS层面拦截"
          echo "- **Hosts规则** (hosts.txt): 0.0.0.0 + 域名格式，用于系统hosts文件"
          echo "- **浏览器规则** (filter.txt): 完整AdBlock语法，用于浏览器扩展"
          echo ""
          
          echo "## 🔄 更新信息"
          echo ""
          echo "- **最后更新时间**: $CURRENT_TIME (北京时间)"
          echo "- **更新频率**: 每8小时自动更新"
          echo "- **下次更新时间**: $NEXT_TIME (北京时间)"
          echo "- **验证标准**: 严格验证（阈值${VALIDITY_THRESHOLD}%）"
          echo ""
          
          echo "## 📁 文件列表"
          echo ""
          echo "| 文件名 | 描述 | 大小 |"
          echo "|--------|------|------|"
          
          if [ -d dist ]; then
            for file in dist/*; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                size=$(wc -c < "$file" 2>/dev/null || echo "0")
                human_size=$(format_size "$size")
                
                case "$filename" in
                  "dns.txt")
                    desc="DNS规则文件"
                    ;;
                  "hosts.txt")
                    desc="Hosts规则文件"
                    ;;
                  "filter.txt")
                    desc="浏览器规则文件"
                    ;;
                  "metadata.json")
                    desc="规则元数据"
                    ;;
                  "validation_report.json")
                    desc="验证报告"
                    ;;
                  "advanced_statistics.md")
                    desc="高级统计报告"
                    ;;
                  *)
                    desc="其他文件"
                    ;;
                esac
                
                echo "| $filename | $desc | $human_size |"
              fi
            done
          fi
          
          echo ""
        } > "$REPORT_FILE"
        
        echo "✅ 高级统计报告已生成: $REPORT_FILE"
    
    - name: Step 8 - 质量检查
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🧪 质量检查                    │"
        echo "│    (文件完整性/格式检查)                │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "🔍 执行质量检查..."
        
        # 检查文件完整性
        ERROR_COUNT=0
        WARNING_COUNT=0
        
        # 1. 检查三层规则文件
        for file in "dns.txt" "hosts.txt" "filter.txt"; do
          if [ -f "dist/$file" ]; then
            if [ ! -s "dist/$file" ]; then
              echo "❌ $file 文件为空"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            else
              # 检查是否有内容（不只是注释）
              if [ "$file" = "filter.txt" ]; then
                CONTENT_LINES=$(grep -v '^!' "dist/$file" | grep -v '^$' | wc -l 2>/dev/null || echo "0")
              else
                CONTENT_LINES=$(grep -v '^#' "dist/$file" | grep -v '^$' | wc -l 2>/dev/null || echo "0")
              fi
              if [ "$CONTENT_LINES" -eq 0 ]; then
                echo "⚠️  $file 文件没有有效规则（只有注释）"
                WARNING_COUNT=$((WARNING_COUNT + 1))
              fi
            fi
          else
            echo "❌ $file 文件不存在"
            ERROR_COUNT=$((ERROR_COUNT + 1))
          fi
        done
        
        # 2. 检查额外规则源文件
        if [ -f "sources/gz.txt" ]; then
          echo "📝 检查额外规则源文件..."
          if [ ! -s "sources/gz.txt" ]; then
            echo "  ⚠️  sources/gz.txt 为空"
            WARNING_COUNT=$((WARNING_COUNT + 1))
          else
            echo "  ✅ sources/gz.txt 存在且非空"
          fi
        fi
        
        # 3. 检查文件编码
        echo "📝 检查文件编码..."
        find dist -maxdepth 1 \( -name "*.txt" -o -name "*.md" \) 2>/dev/null | while read -r file; do
          if [ -f "$file" ]; then
            if file "$file" | grep -q "UTF-8"; then
              echo "  ✅ $(basename "$file"): UTF-8 编码"
            else
              echo "  ⚠️  $(basename "$file"): 非UTF-8编码"
              WARNING_COUNT=$((WARNING_COUNT + 1))
            fi
          fi
        done
        
        # 4. 检查JSON格式
        for json_file in "dist/metadata.json" "dist/validation_report.json"; do
          if [ -f "$json_file" ]; then
            if python3 -m json.tool "$json_file" > /dev/null 2>&1; then
              echo "✅ $(basename "$json_file"): JSON格式正确"
            else
              echo "❌ $(basename "$json_file"): JSON格式错误"
              ERROR_COUNT=$((ERROR_COUNT + 1))
            fi
          fi
        done
        
        # 5. 统计摘要
        echo ""
        echo "📋 质量检查摘要:"
        echo "  ├── 错误: $ERROR_COUNT 个"
        echo "  ├── 警告: $WARNING_COUNT 个"
        echo "  └── 文件数: $(ls -1 dist/* 2>/dev/null | wc -l) 个"
        
        if [ "$ERROR_COUNT" -gt 0 ]; then
          echo "⚠️  质量检查发现错误"
        else
          echo "✅ 质量检查通过"
        fi
    
    - name: Step 9 - 发布准备
      run: |
        echo ""
        echo "┌─────────────────────────────────────────────────────┐"
        echo "│            🚀 发布到 GitHub / CDN                   │"
        echo "├─────────────────────────────────────────────────────┤"
        echo "│    • 📄 dns.txt (DNS规则)                          │"
        echo "│    • 📄 hosts.txt (Hosts规则)                      │"
        echo "│    • 📄 filter.txt (浏览器规则)                    │"
        echo "│    • 📊 metadata.json (规则元数据)                 │"
        echo "│    • 🔍 validation_report.json (验证报告)          │"
        echo "│    • 📈 advanced_statistics.md (高级统计)          │"
        echo "│    • 🌐 额外规则源: sources/gz.txt                 │"
        echo "│    • ⚡ 三层规则: 支持DNS/Hosts/浏览器三种格式     │"
        echo "│    • 🛡️  严格验证: 阈值${VALIDITY_THRESHOLD}%     │"
        echo "│    • ✨ 新语法: 优化后的规则语法                   │"
        echo "└─────────────────────────────────────────────────────┘"
        echo ""
        
        # 显示文件详细信息
        echo "📁 生成的文件详情:"
        echo ""
        
        # 检查dist目录是否存在
        if [ -d dist ]; then
          for file in dist/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              lines=$(wc -l < "$file" 2>/dev/null || echo "0")
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              
              # 格式化大小
              if [ "$size" -ge 1048576 ]; then
                human_size="$((size/1048576))MB"
              elif [ "$size" -ge 1024 ]; then
                human_size="$((size/1024))KB"
              else
                human_size="${size}B"
              fi
              
              case "$filename" in
                "dns.txt")
                  rules=$(grep -v '^!' "$file" | grep -v '^$' | wc -l 2>/dev/null || echo "0")
                  echo "  📄 $filename"
                  echo "     ├── 规则数: $rules 条"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "hosts.txt")
                  rules=$(grep -v '^!' "$file" | grep -v '^$' | wc -l 2>/dev/null || echo "0")
                  echo "  📄 $filename"
                  echo "     ├── 规则数: $rules 条"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "filter.txt")
                  rules=$(grep -v '^!' "$file" | grep -v '^$' | wc -l 2>/dev/null || echo "0")
                  echo "  📄 $filename"
                  echo "     ├── 规则数: $rules 条"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "metadata.json")
                  echo "  📊 $filename"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "validation_report.json")
                  echo "  🔍 $filename"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                "advanced_statistics.md")
                  echo "  📈 $filename"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
                *)
                  echo "  📝 $filename"
                  echo "     ├── 行数: $lines 行"
                  echo "     └── 大小: $human_size"
                  ;;
              esac
              echo ""
            fi
          done
        else
          echo "⚠️  dist目录不存在，没有生成文件"
          echo ""
        fi
        
        # 显示额外规则源文件
        if [ -f "sources/gz.txt" ]; then
          echo "📄 额外规则源文件:"
          size=$(wc -c < "sources/gz.txt" 2>/dev/null || echo "0")
          lines=$(wc -l < "sources/gz.txt" 2>/dev/null || echo "0")
          
          if [ "$size" -ge 1048576 ]; then
            human_size="$((size/1048576))MB"
          elif [ "$size" -ge 1024 ]; then
            human_size="$((size/1024))KB"
          else
            human_size="${size}B"
          fi
          
          echo "  📝 sources/gz.txt"
          echo "     ├── 行数: $lines 行"
          echo "     └── 大小: $human_size"
          echo ""
        fi
        
        # 显示目录大小
        if [ -d dist ]; then
          DIST_SIZE=$(du -sh dist 2>/dev/null | cut -f1 || echo "未知")
          echo "📦 总目录大小: $DIST_SIZE"
        else
          echo "📦 dist目录不存在"
        fi
        
        echo ""
        echo "✅ 发布准备完成"
    
    - name: Step 10 - 检查变更
      id: check-changes
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 检查变更                    │"
        echo "│    (自动调度与变更检测)                 │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        echo "🔍 检查Git状态..."
        git status --porcelain
        
        echo ""
        echo "📋 检查文件变更..."
        
        # 添加所有变更
        git add -A
        
        # 检查是否有变更
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> "$GITHUB_OUTPUT"
          echo "✅ 工作流完成，无需提交"
        else
          echo "🔄 检测到规则变更"
          echo "changes_detected=true" >> "$GITHUB_OUTPUT"
          
          # 显示变更摘要
          echo ""
          echo "📋 变更摘要:"
          git diff --cached --name-only | while read -r file; do
            if echo "$file" | grep -q "^dist/"; then
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              if [ "$size" -ge 1024 ]; then
                size_human="$((size/1024))KB"
              else
                size_human="${size}B"
              fi
              echo "  📄 $file ($size_human)"
            elif echo "$file" | grep -q "^sources/gz.txt"; then
              echo "  🌐 $file (额外规则源)"
            elif echo "$file" | grep -q "^rules/"; then
              echo "  📁 $file"
            elif echo "$file" | grep -q "^scripts/"; then
              echo "  🛠️  $file"
            elif echo "$file" | grep -q "^sources/"; then
              echo "  🌐 $file"
            else
              echo "  📝 $file"
            fi
          done
        fi
    
    - name: Step 11 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📤 提交变更                    │"
        echo "│    (自动提交到GitHub)                   │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 配置Git用户
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 从环境变量获取统计值
        DNS_COUNT="${{ steps.generate-files.outputs.dns_rules }}"
        HOSTS_COUNT="${{ steps.generate-files.outputs.hosts_rules }}"
        FILTER_COUNT="${{ steps.generate-files.outputs.filter_rules }}"
        TOTAL_COUNT="${{ steps.generate-files.outputs.total_rules }}"
        DOMAIN_COUNT="${{ steps.generate-files.outputs.domain_rules }}"
        ELEMENT_COUNT="${{ steps.generate-files.outputs.element_rules }}"
        EXCEPTION_COUNT="${{ steps.generate-files.outputs.exception_rules }}"
        ADVANCED_COUNT="${{ steps.generate-files.outputs.advanced_rules }}"
        
        # 设置默认值
        DNS_COUNT=${DNS_COUNT:-0}
        HOSTS_COUNT=${HOSTS_COUNT:-0}
        FILTER_COUNT=${FILTER_COUNT:-0}
        TOTAL_COUNT=${TOTAL_COUNT:-0}
        DOMAIN_COUNT=${DOMAIN_COUNT:-0}
        ELEMENT_COUNT=${ELEMENT_COUNT:-0}
        EXCEPTION_COUNT=${EXCEPTION_COUNT:-0}
        ADVANCED_COUNT=${ADVANCED_COUNT:-0}
        
        COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
        COMMIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
        
        # 创建详细的提交信息
        {
          echo "🤖 自动更新广告拦截规则 - 新语法版 [$COMMIT_TIME]"
          echo ""
          echo "📊 三层规则统计:"
          echo "- DNS规则: $DNS_COUNT 条"
          echo "- Hosts规则: $HOSTS_COUNT 条"
          echo "- 浏览器规则: $FILTER_COUNT 条"
          echo "- 总计: $TOTAL_COUNT 条规则"
          echo ""
          echo "🎯 浏览器规则分类:"
          echo "- 域名拦截: $DOMAIN_COUNT 条"
          echo "- 元素隐藏: $ELEMENT_COUNT 条"
          echo "- 例外规则: $EXCEPTION_COUNT 条"
          echo "- 高级规则: $ADVANCED_COUNT 条"
          echo ""
          echo "⚡ 新语法特性:"
          echo "- 三层规则: DNS/Hosts/浏览器格式分离"
          echo "- 语法优化: 去重、分类、性能优化"
          echo "- 严格验证: ${VALIDITY_THRESHOLD}%有效性阈值"
          echo "- 额外规则源: sources/gz.txt"
          echo ""
          echo "🌐 规则源更新:"
          echo "- 主规则源: sources/sources.json"
          echo "- 额外规则源: sources/gz.txt"
          echo "- 自定义规则: rules/custom/"
          echo ""
          echo "📈 生成报告:"
          echo "- 详细规则分类分析"
          echo "- 高级统计报告"
          echo "- 验证报告和冲突检测"
          echo ""
          echo "✨ 拦截类型:"
          echo "• DNS层面广告拦截"
          echo "• 系统hosts广告拦截"
          echo "• 浏览器元素隐藏"
          echo "• 高级规则拦截"
          echo ""
          echo "🛡️ 质量保证:"
          echo "• 严格语法验证"
          echo "• 自动冲突检测"
          echo "• 智能去重优化"
          echo "• 文件完整性检查"
          echo ""
          echo "🔗 提交哈希: $COMMIT_HASH"
          echo "🤖 由 GitHub Actions 自动生成"
          echo "⏰ 下次更新: $(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M') (北京时间)"
        } > /tmp/commit_message.txt
        
        # 使用文件内容进行提交
        echo "💾 提交变更..."
        if git commit -F /tmp/commit_message.txt; then
          echo "📤 推送到远程仓库..."
          if git push origin HEAD:main; then
            echo "✅ 变更已提交到 GitHub"
            echo "🔗 查看提交: https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD)"
          else
            echo "❌ 推送失败，请检查权限"
            exit 1
          fi
        else
          echo "❌ 提交失败，可能没有变更需要提交"
          exit 0
        fi
    
    - name: Step 12 - 生成工作流摘要
      if: always()
      run: |
        # 创建摘要文件
        SUMMARY_FILE="$GITHUB_STEP_SUMMARY"
        
        echo "## 📋 AdBlock 规则更新摘要 - 新语法版" > "$SUMMARY_FILE"
        echo "" >> "$SUMMARY_FILE"
        
        # 获取时间
        CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
        NEXT_TIME=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')
        
        # 从环境变量获取统计值
        DNS_COUNT="${{ steps.generate-files.outputs.dns_rules }}"
        HOSTS_COUNT="${{ steps.generate-files.outputs.hosts_rules }}"
        FILTER_COUNT="${{ steps.generate-files.outputs.filter_rules }}"
        TOTAL_COUNT="${{ steps.generate-files.outputs.total_rules }}"
        DOMAIN_COUNT="${{ steps.generate-files.outputs.domain_rules }}"
        ELEMENT_COUNT="${{ steps.generate-files.outputs.element_rules }}"
        EXCEPTION_COUNT="${{ steps.generate-files.outputs.exception_rules }}"
        ADVANCED_COUNT="${{ steps.generate-files.outputs.advanced_rules }}"
        
        # 设置默认值
        DNS_COUNT=${DNS_COUNT:-0}
        HOSTS_COUNT=${HOSTS_COUNT:-0}
        FILTER_COUNT=${FILTER_COUNT:-0}
        TOTAL_COUNT=${TOTAL_COUNT:-0}
        DOMAIN_COUNT=${DOMAIN_COUNT:-0}
        ELEMENT_COUNT=${ELEMENT_COUNT:-0}
        EXCEPTION_COUNT=${EXCEPTION_COUNT:-0}
        ADVANCED_COUNT=${ADVANCED_COUNT:-0}
        
        # 验证状态
        VALIDATION_EXIT_CODE="0"
        if [ -n "${{ steps.validate-rules.outputs.validation_exit_code }}" ]; then
          VALIDATION_EXIT_CODE="${{ steps.validate-rules.outputs.validation_exit_code }}"
        fi
        
        cat >> "$SUMMARY_FILE" << EOF
        
        ### 📊 三层规则统计
        
        | 规则类型 | 数量 | 用途 |
        |----------|------|------|
        | DNS规则 | $DNS_COUNT 条 | 用于AdGuard Home/DNS服务 |
        | Hosts规则 | $HOSTS_COUNT 条 | 用于系统hosts文件 |
        | 浏览器规则 | $FILTER_COUNT 条 | 用于uBlock Origin/AdBlock |
        | **总计** | **$TOTAL_COUNT 条** | 所有规则总和 |
        
        ### 🎯 浏览器规则分类
        
        | 规则类型 | 数量 |
        |----------|------|
        | 域名拦截规则 | $DOMAIN_COUNT 条 |
        | 元素隐藏规则 | $ELEMENT_COUNT 条 |
        | 例外规则 | $EXCEPTION_COUNT 条 |
        | 高级规则 | $ADVANCED_COUNT 条 |
        
        ### 🔍 验证状态
        
        EOF
        
        case "$VALIDATION_EXIT_CODE" in
          0)
            echo "✅ **验证通过** - 所有规则语法检查通过" >> "$SUMMARY_FILE"
            ;;
          1)
            echo "⚠️ **验证警告** - 规则有效性低于${VALIDITY_THRESHOLD}%，但已通过严格验证" >> "$SUMMARY_FILE"
            ;;
          2)
            echo "❌ **验证失败** - 没有有效规则" >> "$SUMMARY_FILE"
            ;;
          *)
            echo "❓ **验证状态未知** - 退出码: $VALIDATION_EXIT_CODE" >> "$SUMMARY_FILE"
            ;;
        esac
        
        cat >> "$SUMMARY_FILE" << EOF
        
        ### 📁 生成的文件
        
        EOF
        
        if [ -d dist ]; then
          for file in dist/*; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              
              # 格式化大小
              if [ "$size" -ge 1048576 ]; then
                human_size="$((size/1048576))MB"
              elif [ "$size" -ge 1024 ]; then
                human_size="$((size/1024))KB"
              else
                human_size="${size}B"
              fi
              
              case "$filename" in
                "dns.txt")
                  echo "- **dns.txt** - DNS规则文件 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "hosts.txt")
                  echo "- **hosts.txt** - Hosts规则文件 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "filter.txt")
                  echo "- **filter.txt** - 浏览器规则文件 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "metadata.json")
                  echo "- **metadata.json** - 规则元数据 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "validation_report.json")
                  echo "- **validation_report.json** - 验证报告 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
                "advanced_statistics.md")
                  echo "- **advanced_statistics.md** - 高级统计报告 ($human_size)" >> "$SUMMARY_FILE"
                  ;;
              esac
            fi
          done
        else
          echo "- 没有生成文件" >> "$SUMMARY_FILE"
        fi
        
        # 添加额外规则源文件
        if [ -f "sources/gz.txt" ]; then
          size=$(wc -c < "sources/gz.txt" 2>/dev/null || echo "0")
          if [ "$size" -ge 1048576 ]; then
            human_size="$((size/1048576))MB"
          elif [ "$size" -ge 1024 ]; then
            human_size="$((size/1024))KB"
          else
            human_size="${size}B"
          fi
          echo "- **sources/gz.txt** - 额外规则源文件 ($human_size)" >> "$SUMMARY_FILE"
        fi
        
        cat >> "$SUMMARY_FILE" << EOF
        
        ### 🔄 更新信息
        
        - **更新时间**: $CURRENT_TIME (北京时间)
        - **更新频率**: 每8小时自动更新
        - **下次更新**: $NEXT_TIME (北京时间)
        - **验证标准**: 严格验证（阈值${VALIDITY_THRESHOLD}%）
        - **额外规则源**: sources/gz.txt
        - **新语法**: 三层规则系统
        
        ### 📋 步骤执行状态
        
        | 步骤 | 状态 |
        |------|------|
        | 规则源同步 | ✅ |
        | 规则合并 | ✅ |
        EOF
        
        case "$VALIDATION_EXIT_CODE" in
          0)
            echo "| 规则验证 | ✅ |" >> "$SUMMARY_FILE"
            ;;
          1)
            echo "| 规则验证 | ⚠️ |" >> "$SUMMARY_FILE"
            ;;
          *)
            echo "| 规则验证 | ❌ |" >> "$SUMMARY_FILE"
            ;;
        esac
        
        cat >> "$SUMMARY_FILE" << EOF
        | 规则优化 | ✅ |
        | 文件生成 | ✅ |
        | 质量检查 | ✅ |
        | 变更提交 | ✅ |
        
        🤖 由 GitHub Actions 自动执行
        EOF
    
    - name: Step 13 - 工作流完成
      if: always()
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ✅ 工作流执行完成              │"
        echo "└─────────────────────────────────────────┘"
