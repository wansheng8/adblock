name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,8,16 * * *'  # 北京时间 08:00, 16:00, 00:00 (次日)
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'
      - 'sources/gz.txt'
      - 'rules/custom/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Cache Python dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        echo "📦 安装依赖..."
        pip install requests beautifulsoup4 lxml pyyaml
        pip list
    
    - name: Create directories
      run: |
        echo "📁 创建目录结构..."
        mkdir -p dist
        mkdir -p rules/raw
        mkdir -p rules/processed
        mkdir -p rules/custom
        mkdir -p docs/reports
        echo "✅ 目录创建完成"
    
    - name: Step 1 - 规则源同步
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🚀 规则源同步                  │"
        echo "│       (23+个广告拦截源)                │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        if [ -f scripts/update_rules.py ]; then
          python scripts/update_rules.py
          UPDATE_STATUS=$?
          if [ $UPDATE_STATUS -ne 0 ]; then
            echo "❌ 规则源同步失败，退出码: $UPDATE_STATUS"
            exit $UPDATE_STATUS
          fi
        else
          echo "❌ 规则更新脚本不存在"
          exit 1
        fi
        
        echo "✅ 规则源同步完成"
    
    - name: Step 2 - 规则合并
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 规则合并                    │"
        echo "│       (合并自定义规则)                  │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        if [ -f scripts/merge_rules.py ]; then
          python scripts/merge_rules.py
          MERGE_STATUS=$?
          if [ $MERGE_STATUS -ne 0 ]; then
            echo "⚠️  规则合并过程出现警告，继续执行..."
          fi
        else
          echo "ℹ️  规则合并脚本不存在，跳过此步骤"
        fi
        
        echo "✅ 规则合并完成"
    
    - name: Step 3 - 规则验证器
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔍 规则验证器                  │"
        echo "│    (语法检查/格式验证/冲突检测)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        if [ -f scripts/validate_rules.py ]; then
          python scripts/validate_rules.py
          VALIDATION_STATUS=$?
          if [ $VALIDATION_STATUS -eq 1 ]; then
            echo "⚠️  规则验证警告，有效性低于90%"
          elif [ $VALIDATION_STATUS -eq 2 ]; then
            echo "❌ 规则验证失败，没有有效规则"
            exit 2
          elif [ $VALIDATION_STATUS -ne 0 ]; then
            echo "⚠️  规则验证过程出现错误，继续执行..."
          fi
        else
          echo "ℹ️  规则验证脚本不存在，跳过此步骤"
        fi
        
        echo "✅ 规则验证完成"
    
    - name: Step 4 - 规则优化器
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          ⚡ 规则优化器                  │"
        echo "│ (去重/分类/性能优化/高级语法处理)       │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
          FORMAT_STATUS=$?
          if [ $FORMAT_STATUS -ne 0 ]; then
            echo "⚠️  规则优化过程出现错误，继续执行..."
          fi
        else
          echo "ℹ️  规则优化脚本不存在，跳过此步骤"
        fi
        
        echo "✅ 规则优化完成"
    
    - name: Step 5 - 生成最终文件
      id: generate-files
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📁 生成最终文件                │"
        echo "│  (黑白名单/元数据/验证报告/统计)        │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 确保文件存在
        touch dist/blacklist.txt dist/whitelist.txt
        touch dist/metadata.json dist/validation_report.json
        
        # 统计规则数量（排除注释和空行）
        if [ -f dist/blacklist.txt ]; then
          BLACK_RULES=$(grep -v '^!' dist/blacklist.txt | grep -v '^$' | wc -l)
          BLACK_SIZE=$(wc -c < dist/blacklist.txt)
          echo "📄 黑名单: $BLACK_RULES 条规则, $BLACK_SIZE 字节"
        else
          BLACK_RULES=0
          BLACK_SIZE=0
          echo "❌ 黑名单文件不存在"
        fi
        
        if [ -f dist/whitelist.txt ]; then
          WHITE_RULES=$(grep -v '^!' dist/whitelist.txt | grep -v '^$' | wc -l)
          WHITE_SIZE=$(wc -c < dist/whitelist.txt)
          echo "📄 白名单: $WHITE_RULES 条规则, $WHITE_SIZE 字节"
        else
          WHITE_RULES=0
          WHITE_SIZE=0
          echo "❌ 白名单文件不存在"
        fi
        
        TOTAL_RULES=$((BLACK_RULES + WHITE_RULES))
        
        # 高级规则统计
        if [ -f dist/blacklist.txt ]; then
          ADVANCED_RULES=$(grep -c '#@#\|#?#\|\$\$' dist/blacklist.txt || echo "0")
          MODIFIER_RULES=$(grep -c '\$[a-z]' dist/blacklist.txt || echo "0")
          echo "⚡ 高级规则: $ADVANCED_RULES 条"
          echo "⚙️  修饰符规则: $MODIFIER_RULES 条"
        fi
        
        # 输出到环境变量
        echo "black_rules=$BLACK_RULES" >> $GITHUB_OUTPUT
        echo "white_rules=$WHITE_RULES" >> $GITHUB_OUTPUT
        echo "total_rules=$TOTAL_RULES" >> $GITHUB_OUTPUT
        echo "advanced_rules=$ADVANCED_RULES" >> $GITHUB_OUTPUT
        
        echo "📊 规则统计:"
        echo "├── 黑名单: $BLACK_RULES 条规则"
        echo "├── 白名单: $WHITE_RULES 条规则"
        echo "├── 总计: $TOTAL_RULES 条规则"
        echo "└── 高级规则: $ADVANCED_RULES 条"
    
    - name: Step 6 - 生成高级统计报告
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📈 生成高级统计报告            │"
        echo "│    (详细规则分析/分类统计/趋势)         │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 获取当前时间
        CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
        NEXT_TIME=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M:%S')
        
        # 读取规则统计
        BLACK_COUNT=${{ steps.generate-files.outputs.black_rules || 0 }}
        WHITE_COUNT=${{ steps.generate-files.outputs.white_rules || 0 }}
        TOTAL_COUNT=${{ steps.generate-files.outputs.total_rules || 0 }}
        ADVANCED_COUNT=${{ steps.generate-files.outputs.advanced_rules || 0 }}
        
        # 检查混合规则源
        MIXED_SOURCES=0
        if [ -f sources/sources.json ]; then
          MIXED_SOURCES=$(grep -c '"type": "mixed"' sources/sources.json || echo "0")
        fi
        
        # 检查自定义规则
        CUSTOM_RULES=0
        if [ -d rules/custom ]; then
          CUSTOM_RULES=$(find rules/custom -name "*.txt" -exec cat {} \; 2>/dev/null | grep -v '^!' | grep -v '^$' | wc -l || echo "0")
        fi
        
        # 创建详细统计报告
        echo "# 📊 AdBlock 规则高级统计报告" > dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        echo "> 本报告由 GitHub Actions 自动生成，包含高级规则分析和详细统计" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        
        # 总体统计
        echo "## 📈 总体统计" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        echo "| 指标 | 数量 | 说明 |" >> dist/advanced_statistics.md
        echo "|------|------|------|" >> dist/advanced_statistics.md
        echo "| 黑名单规则 | $BLACK_COUNT 条 | 拦截广告和恶意内容的规则 |" >> dist/advanced_statistics.md
        echo "| 白名单规则 | $WHITE_COUNT 条 | 避免误拦截的例外规则 |" >> dist/advanced_statistics.md
        echo "| 总规则数 | $TOTAL_COUNT 条 | 所有规则总和 |" >> dist/advanced_statistics.md
        echo "| 高级规则 | $ADVANCED_COUNT 条 | 包含高级语法的规则 |" >> dist/advanced_statistics.md
        echo "| 混合规则源 | $MIXED_SOURCES 个 | 包含多个子规则源的混合源 |" >> dist/advanced_statistics.md
        echo "| 自定义规则 | $CUSTOM_RULES 条 | 用户自定义的规则 |" >> dist/advanced_statistics.md
        echo "| 生成时间 | $CURRENT_TIME | 北京时间 |" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        
        # 高级规则分析
        echo "## ⚡ 高级规则分析" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        echo "### 支持的规则类型" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        echo "1. **域名拦截规则** (`||example.com^`)" >> dist/advanced_statistics.md
        echo "2. **域名例外规则** (`@@||example.com^`)" >> dist/advanced_statistics.md
        echo "3. **元素隐藏规则** (`##.ad-class`)" >> dist/advanced_statistics.md
        echo "4. **元素隐藏例外规则** (`#@#.ad-class`)" >> dist/advanced_statistics.md
        echo "5. **高级选择器规则** (`#?#div:-abp-has(> .ad)`)" >> dist/advanced_statistics.md
        echo "6. **元素移除规则** (`$$.ad-banner`)" >> dist/advanced_statistics.md
        echo "7. **正则表达式规则** (`/ad\\d+\\.js/`)" >> dist/advanced_statistics.md
        echo "8. **参数移除规则** (`||example.com^$removeparam=utm_*`)" >> dist/advanced_statistics.md
        echo "9. **域名限定规则** (`||ads.com^$domain=example.com`)" >> dist/advanced_statistics.md
        echo "10. **重定向规则** (`||tracking.com^$redirect=noop`)" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        
        # 混合规则源说明
        if [ $MIXED_SOURCES -gt 0 ]; then
          echo "## 🌐 混合规则源" >> dist/advanced_statistics.md
          echo "" >> dist/advanced_statistics.md
          echo "混合规则源包含多个第三方规则集合，提供更全面的广告拦截覆盖。" >> dist/advanced_statistics.md
          echo "" >> dist/advanced_statistics.md
          
          if [ -f sources/gz.txt ]; then
            echo "**包含的规则源:**" >> dist/advanced_statistics.md
            echo "" >> dist/advanced_statistics.md
            while IFS= read -r line; do
              if [ -n "$line" ]; then
                echo "- \`$line\`" >> dist/advanced_statistics.md
              fi
            done < sources/gz.txt
            echo "" >> dist/advanced_statistics.md
          fi
        fi
        
        # 拦截内容分类
        echo "## 🎯 拦截内容分类" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        echo "| 类别 | 描述 | 示例规则 |" >> dist/advanced_statistics.md
        echo "|------|------|----------|" >> dist/advanced_statistics.md
        echo "| 开屏广告 | 应用启动时的全屏广告 | `||ad.com/splash/*` |" >> dist/advanced_statistics.md
        echo "| 弹窗广告 | 网页弹窗、浮动窗口 | `##.popup-ad` |" >> dist/advanced_statistics.md
        echo "| 视频广告 | 视频前贴片、中插广告 | `||video-ad.com^` |" >> dist/advanced_statistics.md
        echo "| 横幅广告 | 页面顶部/底部横幅 | `##.banner-ad` |" >> dist/advanced_statistics.md
        echo "| 内联广告 | 文章内容中的原生广告 | `##.native-ad` |" >> dist/advanced_statistics.md
        echo "| 跟踪器 | 用户行为跟踪脚本 | `||tracker.com^` |" >> dist/advanced_statistics.md
        echo "| 恶意软件 | 钓鱼、挖矿、病毒网站 | `||malware.com^` |" >> dist/advanced_statistics.md
        echo "| 社交媒体 | 社交分享按钮追踪 | `||share-button.com^` |" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        
        # 更新时间信息
        echo "## 🔄 更新信息" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        echo "- **最后更新时间**: $CURRENT_TIME (北京时间)" >> dist/advanced_statistics.md
        echo "- **更新频率**: 每8小时自动更新" >> dist/advanced_statistics.md
        echo "- **下次更新时间**: $NEXT_TIME (北京时间)" >> dist/advanced_statistics.md
        echo "- **数据来源**: 23+个主流广告规则源（含混合规则）" >> dist/advanced_statistics.md
        echo "- **高级功能**: 支持15种规则类型，自动冲突检测，智能优化" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        
        # 文件列表
        echo "## 📁 文件列表" >> dist/advanced_statistics.md
        echo "" >> dist/advanced_statistics.md
        echo "| 文件名 | 描述 | 大小 |" >> dist/advanced_statistics.md
        echo "|--------|------|------|" >> dist/advanced_statistics.md
        
        # 添加文件大小信息
        for file in dist/*.txt dist/*.json dist/*.md; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            size=$(wc -c < "$file")
            human_size=$(numfmt --to=iec --suffix=B $size)
            
            case $filename in
              "blacklist.txt")
                desc="主广告拦截规则"
                ;;
              "whitelist.txt")
                desc="白名单例外规则"
                ;;
              "metadata.json")
                desc="规则元数据"
                ;;
              "validation_report.json")
                desc="验证报告"
                ;;
              "advanced_statistics.md")
                desc="高级统计报告"
                ;;
              *)
                desc="其他文件"
                ;;
            esac
            
            echo "| $filename | $desc | $human_size |" >> dist/advanced_statistics.md
          fi
        done
        
        echo "" >> dist/advanced_statistics.md
        
        echo "✅ 高级统计报告已生成: dist/advanced_statistics.md"
    
    - name: Step 7 - 规则质量检查
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🧪 规则质量检查                │"
        echo "│    (有效性/冲突/冗余检查)               │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        # 检查规则有效性
        if [ -f dist/blacklist.txt ]; then
          echo "🔍 检查规则有效性..."
          
          # 检查空规则
          EMPTY_RULES=$(grep -c '^$' dist/blacklist.txt || echo "0")
          if [ $EMPTY_RULES -gt 0 ]; then
            echo "⚠️  发现 $EMPTY_RULES 个空行"
          fi
          
          # 检查注释比例
          TOTAL_LINES=$(wc -l < dist/blacklist.txt || echo "0")
          COMMENT_LINES=$(grep -c '^!' dist/blacklist.txt || echo "0")
          if [ $TOTAL_LINES -gt 0 ]; then
            COMMENT_RATIO=$((COMMENT_LINES * 100 / TOTAL_LINES))
            echo "📝 注释比例: $COMMENT_RATIO% ($COMMENT_LINES/$TOTAL_LINES)"
          fi
          
          # 检查规则长度分布
          echo "📏 规则长度分析:"
          awk '!/^!/ && !/^$/ {print length($0)}' dist/blacklist.txt 2>/dev/null | \
            awk '{if($1<50) short++; else if($1>200) long++; else medium++; total++} \
            END {printf("  ├── 短规则(<50字符): %d (%.1f%%)\n", short, (short/total)*100); \
                 printf("  ├── 中规则(50-200字符): %d (%.1f%%)\n", medium, (medium/total)*100); \
                 printf("  └── 长规则(>200字符): %d (%.1f%%)\n", long, (long/total)*100)}' || echo "  无法分析规则长度"
        fi
        
        echo "✅ 规则质量检查完成"
    
    - name: Step 8 - 发布准备
      run: |
        echo ""
        echo "┌─────────────────────────────────────────────────────┐"
        echo "│            🚀 发布到 GitHub / CDN                   │"
        echo "├─────────────────────────────────────────────────────┤"
        echo "│    • 📄 blacklist.txt (主拦截规则)                 │"
        echo "│    • ✅ whitelist.txt (例外规则)                   │"
        echo "│    • 📊 metadata.json (规则元数据)                 │"
        echo "│    • 🔍 validation_report.json (验证报告)          │"
        echo "│    • 📈 advanced_statistics.md (高级统计)          │"
        echo "│    • 🌐 混合规则源: 包含6+第三方规则              │"
        echo "│    • ⚡ 高级规则: 支持15种规则类型                 │"
        echo "└─────────────────────────────────────────────────────┘"
        echo ""
        
        # 显示文件大小和详细信息
        echo "📁 生成的文件:"
        ls -lh dist/*.txt dist/*.json dist/*.md 2>/dev/null || echo "dist目录中没有文件"
        
        # 显示文件摘要
        echo ""
        echo "📋 文件摘要:"
        for file in dist/*.txt; do
          if [ -f "$file" ]; then
            filename=$(basename "$file")
            lines=$(wc -l < "$file" || echo "0")
            size=$(wc -c < "$file")
            human_size=$(numfmt --to=iec --suffix=B $size)
            
            case $filename in
              "blacklist.txt")
                rules=$(grep -v '^!' "$file" | grep -v '^$' | wc -l)
                echo "  ├── $filename: $rules 条规则, $lines 行, $human_size"
                ;;
              "whitelist.txt")
                rules=$(grep -v '^!' "$file" | grep -v '^$' | wc -l)
                echo "  ├── $filename: $rules 条规则, $lines 行, $human_size"
                ;;
              *)
                echo "  ├── $filename: $lines 行, $human_size"
                ;;
            esac
          fi
        done
        
        # 显示高级规则统计
        echo ""
        echo "⚡ 高级规则统计:"
        if [ -f dist/blacklist.txt ]; then
          advanced_count=$(grep -c '#@#\|#?#\|\$\$' dist/blacklist.txt || echo "0")
          modifier_count=$(grep -c '\$[a-z]' dist/blacklist.txt || echo "0")
          domain_count=$(grep -c '^||' dist/blacklist.txt || echo "0")
          element_count=$(grep -c '^##' dist/blacklist.txt || echo "0")
          
          echo "  ├── 域名拦截规则: $domain_count 条"
          echo "  ├── 元素隐藏规则: $element_count 条"
          echo "  ├── 高级规则: $advanced_count 条"
          echo "  └── 修饰符规则: $modifier_count 条"
        fi
        
        echo ""
        echo "✅ 发布准备完成"
    
    - name: Step 9 - 检查变更
      id: check-changes
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          🔄 检查变更                    │"
        echo "│    (自动调度与变更检测)                 │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        git add -A
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> $GITHUB_OUTPUT
        else
          echo "🔄 检测到规则变更"
          echo "changes_detected=true" >> $GITHUB_OUTPUT
          
          # 显示变更摘要
          echo ""
          echo "📋 变更摘要:"
          git diff --cached --name-only | while read file; do
            if [[ $file == dist/* ]]; then
              echo "  📄 $file (规则文件)"
            elif [[ $file == rules/* ]]; then
              echo "  📁 $file (规则源)"
            elif [[ $file == scripts/* ]]; then
              echo "  🛠️  $file (脚本)"
            elif [[ $file == sources/* ]]; then
              echo "  🌐 $file (源配置)"
            else
              echo "  📝 $file"
            fi
          done
        fi
    
    - name: Step 10 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        echo ""
        echo "┌─────────────────────────────────────────┐"
        echo "│          📤 提交变更                    │"
        echo "│    (自动提交到GitHub)                   │"
        echo "└─────────────────────────────────────────┘"
        echo ""
        
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
