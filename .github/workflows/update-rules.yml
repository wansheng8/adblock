name: 广告拦截规则自动更新器
# 工作流名称：在GitHub Actions页面显示的名称

on:
  # 触发条件配置
  workflow_dispatch:  # 允许手动触发
    inputs:
      描述:
        description: '本次更新的描述'
        required: false
        default: '手动触发规则更新'
  
  schedule:
    # 定时任务，使用UTC时间
    # 对应北京时间：08:00, 16:00, 00:00（次日）
    - cron: '0 0,8,16 * * *'
  
  push:
    # 当推送到main分支且以下文件有变更时触发
    branches: [main]
    paths:
      - 'sources/**'        # 规则源配置变更
      - 'scripts/**'        # 脚本代码变更
      - 'rules/custom/**'   # 自定义规则变更
      - '.github/workflows/**'  # 工作流配置变更

# 环境变量配置
env:
  PYTHON_VERSION: '3.11'  # 使用Python 3.11版本
  UPDATE_TIMEZONE: 'Asia/Shanghai'  # 使用北京时间

# 任务定义
jobs:
  更新规则:  # 任务名称（在GitHub Actions界面显示）
    name: 🚀 更新广告拦截规则
    runs-on: ubuntu-latest  # 使用最新的Ubuntu运行环境
    permissions:
      contents: write  # 授予写入仓库的权限
    timeout-minutes: 30  # 超时时间设为30分钟
    
    steps:
      # 第一步：检出代码
      - name: 📥 检出代码
        uses: actions/checkout@v4  # 使用checkout v4版本
        with:
          fetch-depth: 0  # 获取完整历史记录
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用GitHub Token
    
      # 第二步：设置Python环境
      - name: 🐍 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}  # 使用预设的Python版本
    
      # 第三步：安装依赖
      - name: 📦 安装Python依赖
        run: |
          echo "正在安装依赖包..."
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
          echo "✅ 依赖安装完成"
    
      # 第四步：准备工作目录
      - name: 📁 创建工作目录
        run: |
          echo "创建必要的目录结构..."
          # 创建输出目录
          mkdir -p dist
          # 创建原始规则目录
          mkdir -p rules/raw
          # 创建自定义规则目录（如果不存在）
          mkdir -p rules/custom
          # 创建处理后的规则目录
          mkdir -p rules/processed
          echo "✅ 目录结构创建完成"
    
      # 第五步：运行规则更新器（含Ping检测）
      - name: 🔄 运行规则更新器
        run: |
          echo "开始更新广告拦截规则..."
          echo "语法版本：Adblock语法"
          echo "检测功能：Ping检测"
          echo "=============================="
          
          # 检查更新脚本是否存在
          if [ ! -f "scripts/update_rules.py" ]; then
            echo "❌ 错误：更新脚本不存在"
            exit 1
          fi
          
          # 运行更新脚本
          python scripts/update_rules.py
          更新状态=$?
          
          # 检查生成的文件
          echo "检查生成的规则文件..."
          if [ -f "dist/dns.txt" ]; then
            dns规则数=$(grep -v '^#' dist/dns.txt | grep -v '^$' | wc -l)
            echo "✅ DNS规则文件：${dns规则数}条规则"
          else
            echo "❌ 错误：DNS规则文件未生成"
            exit 1
          fi
          
          if [ -f "dist/hosts.txt" ]; then
            hosts规则数=$(grep -v '^#' dist/hosts.txt | grep -v '^$' | wc -l)
            echo "✅ Hosts规则文件：${hosts规则数}条规则"
          else
            echo "❌ 错误：Hosts规则文件未生成"
            exit 1
          fi
          
          if [ -f "dist/filter.txt" ]; then
            filter规则数=$(grep -v '^!' dist/filter.txt | grep -v '^$' | wc -l)
            echo "✅ 浏览器规则文件：${filter规则数}条规则"
          else
            echo "❌ 错误：浏览器规则文件未生成"
            exit 1
          fi
          
          # 检查Ping检测结果
          if [ -f "dist/ping_results.json" ]; then
            echo "📊 Ping检测结果已保存"
          fi
          
          echo "✅ 规则更新完成"
    
      # 第六步：格式化规则（可选）
      - name: 🎨 格式化规则文件
        run: |
          echo "开始格式化规则文件..."
          if [ -f "scripts/format_rules.py" ]; then
            python scripts/format_rules.py
            echo "✅ 规则格式化完成"
          else
            echo "⚠️ 跳过：格式化脚本不存在"
          fi
    
      # 第七步：验证规则（可选）
      - name: 🔍 验证规则文件
        continue-on-error: true  # 验证失败不停止流程
        run: |
          echo "开始验证规则文件..."
          if [ -f "scripts/validate_rules.py" ]; then
            python scripts/validate_rules.py --simple
            echo "✅ 规则验证完成"
          else
            echo "⚠️ 跳过：验证脚本不存在"
          fi
    
      # 第八步：检查变更并提交
      - name: 💾 提交更新
        if: success()  # 只有前面的步骤都成功才执行
        run: |
          echo "检查Git变更..."
          
          # 配置Git用户信息（使用GitHub Actions机器用户）
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 查看当前状态
          echo "当前Git状态："
          git status --short
          
          # 添加所有变更文件
          git add -A
          
          # 检查是否有变更需要提交
          if git diff --cached --quiet; then
            echo "✅ 没有检测到变更，无需提交"
            exit 0
          fi
          
          # 获取规则统计信息
          dns规则数=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l || echo "0")
          hosts规则数=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l || echo "0")
          filter规则数=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l || echo "0")
          总规则数=$((dns规则数 + hosts规则数 + filter规则数))
          
          # 获取Ping检测结果
          if [ -f "dist/ping_results.json" ]; then
            可达域名数=$(grep -o '"valid_count":[0-9]*' dist/ping_results.json | grep -o '[0-9]*' || echo "0")
            不可达域名数=$(grep -o '"failed_count":[0-9]*' dist/ping_results.json | grep -o '[0-9]*' || echo "0")
            ping总数=$((可达域名数 + 不可达域名数))
            if [ "$ping总数" -gt 0 ]; then
              成功率=$((可达域名数 * 100 / ping总数))
            else
              成功率=0
            fi
          else
            可达域名数=0
            不可达域名数=0
            成功率=0
          fi
          
          # 获取当前时间（北京时间）
          北京时间=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          下次更新时间=$(TZ='Asia/Shanghai' date -d '+8 hours' +'%Y-%m-%d %H:%M')
          
          # 创建提交信息
          cat > /tmp/提交信息.txt << EOF
🤖 自动更新广告拦截规则 [$北京时间]

📊 规则统计：
• DNS规则: $dns规则数 条
• Hosts规则: $hosts规则数 条  
• 浏览器规则: $filter规则数 条
• 总计: $总规则数 条规则

🔍 Ping检测结果：
• 可达域名: $可达域名数 个
• 不可达域名: $不可达域名数 个
• 成功率: $成功率%

🎯 语法特性：
• 支持完整Adblock语法
• 包含白名单规则 (@@||example.com^)
• 包含元素隐藏规则 (##.ad-banner)
• 所有域名已通过Ping检测

🌐 额外规则源：sources/gz.txt
⏰ 下次更新：$下次更新时间

🤖 由 GitHub Actions 自动执行
EOF
          
          # 提交变更
          echo "提交变更..."
          git commit -F /tmp/提交信息.txt
          
          # 推送到远程仓库
          echo "推送到GitHub..."
          git push
          
          echo "✅ 变更已提交并推送"
    
      # 第九步：生成工作流总结报告
      - name: 📋 生成工作流总结
        if: always()  # 无论成功失败都执行
        run: |
          echo "生成工作流执行报告..."
          
          # 获取规则统计
          if [ -f "dist/dns.txt" ]; then
            dns规则数=$(grep -v '^#' dist/dns.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
            dns文件大小=$(stat -c%s dist/dns.txt 2>/dev/null || echo "0")
            dns文件大小_kb=$((dns文件大小 / 1024))
          else
            dns规则数=0
            dns文件大小_kb=0
          fi
          
          if [ -f "dist/hosts.txt" ]; then
            hosts规则数=$(grep -v '^#' dist/hosts.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
            hosts文件大小=$(stat -c%s dist/hosts.txt 2>/dev/null || echo "0")
            hosts文件大小_kb=$((hosts文件大小 / 1024))
          else
            hosts规则数=0
            hosts文件大小_kb=0
          fi
          
          if [ -f "dist/filter.txt" ]; then
            filter规则数=$(grep -v '^!' dist/filter.txt | grep -v '^$' | wc -l 2>/dev/null || echo "0")
            filter文件大小=$(stat -c%s dist/filter.txt 2>/dev/null || echo "0")
            filter文件大小_kb=$((filter文件大小 / 1024))
          else
            filter规则数=0
            filter文件大小_kb=0
          fi
          
          总规则数=$((dns规则数 + hosts规则数 + filter规则数))
          总文件大小_kb=$((dns文件大小_kb + hosts文件大小_kb + filter文件大小_kb))
          
          # 获取工作流执行时间
          开始时间=$(date -d "@${{ job.steps.checkout.outputs.started_at }}" +"%Y-%m-%d %H:%M:%S" 2>/dev/null || echo "未知")
          结束时间=$(date +"%Y-%m-%d %H:%M:%S")
          
          # 生成Markdown格式的总结
          cat >> $GITHUB_STEP_SUMMARY << EOF
# 🎯 广告拦截规则更新报告
          
## 📊 规则文件统计
| 文件类型 | 规则数量 | 文件大小 | 格式说明 |
|----------|----------|----------|----------|
| DNS规则 (dns.txt) | $dns规则数 条 | ${dns文件大小_kb} KB | 纯域名格式 |
| Hosts规则 (hosts.txt) | $hosts规则数 条 | ${hosts文件大小_kb} KB | 0.0.0.0 + 域名 |
| 浏览器规则 (filter.txt) | $filter规则数 条 | ${filter文件大小_kb} KB | Adblock语法 |
| **总计** | **$总规则数 条** | **${总文件大小_kb} KB** | 全部规则 |

## 🔍 Ping检测
- ✅ **可达域名**: $可达域名数 个
- ❌ **不可达域名**: $不可达域名数 个
- 📈 **成功率**: $成功率%

## 🎯 Adblock语法特性
✅ **支持完整Adblock语法**：
- 白名单规则 (\`@@||example.com^\`)
- 域名阻断规则 (\`||example.com^\`)
- 元素隐藏规则 (\`##.ad-banner\`)
- 修饰符规则 (\`\$script,third-party\`)
- Hosts规则 (\`0.0.0.0 example.com\`)

## 🔄 更新信息
- **执行时间**: $开始时间 - $结束时间
- **更新频率**: 每8小时自动更新
- **触发方式**: 定时任务 + 手动触发 + 文件变更
- **额外规则源**: sources/gz.txt
- **语法版本**: Adblock语法 + Ping检测

## 📁 生成的文件
\`\`\`
dist/
├── dns.txt          # DNS规则（纯域名）
├── hosts.txt        # Hosts规则（0.0.0.0格式）
├── filter.txt       # 浏览器规则（Adblock语法）
├── metadata.json    # 元数据信息
└── ping_results.json # Ping检测结果
\`\`\`

🤖 本报告由 GitHub Actions 自动生成
EOF
          
          echo "✅ 工作流总结报告已生成"
