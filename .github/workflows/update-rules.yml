name: 🚀 Update AdBlock Rules

on:
  schedule:
    # 每8小时运行一次 (UTC时间) - 对应北京时间 8:00, 16:00, 24:00
    - cron: '0 */8 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动更新'

env:
  PYTHON_VERSION: '3.9'
  TZ: 'Asia/Shanghai'

permissions:
  contents: write

jobs:
  update-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - name: ⬇️ Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests tqdm
    
    - name: 🛠️ Create necessary directories
      run: |
        mkdir -p dist rules/raw rules/processed
        touch dist/.gitkeep rules/raw/.gitkeep rules/processed/.gitkeep
        
        # 如果不存在自定义白名单，创建默认文件
        if [ ! -f "rules/whitelist_custom.txt" ]; then
          echo "创建默认白名单文件..."
          cat > rules/whitelist_custom.txt << 'EOF'
! 自定义白名单规则
! 在此添加需要免于广告拦截的网站
! 格式: @@||example.com^
EOF
        fi
    
    - name: 🔄 Run update script
      run: |
        echo "开始更新规则..."
        python scripts/update_rules.py
        echo "规则更新完成!"
      
    - name: 📊 Show statistics
      run: |
        echo "=== 规则统计 ==="
        if [ -f "dist/metadata.json" ]; then
          echo "元数据:"
          cat dist/metadata.json | python -m json.tool
        fi
        
        echo ""
        echo "文件大小:"
        ls -lh dist/*.txt
        
        echo ""
        echo "规则数量统计:"
        if [ -f "dist/blacklist.txt" ]; then
          echo "黑名单规则数: $(grep -c '^[^!]' dist/blacklist.txt || echo 0)"
        fi
        if [ -f "dist/whitelist.txt" ]; then
          echo "白名单规则数: $(grep -c '^[^!]' dist/whitelist.txt || echo 0)"
        fi
    
    - name: 💾 Commit changes
      if: success()
      run: |
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        
        # 检查是否有文件变更
        if git status --porcelain | grep -q "."; then
          echo "检测到变更，准备提交..."
          
          # 添加所有变更的文件
          git add dist/ rules/raw/ rules/invalid_rules.log 2>/dev/null || true
          
          # 获取更新摘要
          BLACKLIST_COUNT=$(grep -c '^[^!]' dist/blacklist.txt 2>/dev/null || echo 0)
          WHITELIST_COUNT=$(grep -c '^[^!]' dist/whitelist.txt 2>/dev/null || echo 0)
          TOTAL_COUNT=$((BLACKLIST_COUNT + WHITELIST_COUNT))
          
          git commit -m "🤖 自动更新规则 $(date +'%Y-%m-%d %H:%M:%S')

规则统计:
- 黑名单规则: $BLACKLIST_COUNT
- 白名单规则: $WHITELIST_COUNT
- 总规则数: $TOTAL_COUNT

[skip ci]"
          echo "提交完成"
        else
          echo "没有检测到变更"
        fi
    
    - name: 🚀 Push changes
      if: success()
      run: |
        # 只有有提交时才推送
        if git log origin/main..HEAD --oneline | grep -q "."; then
          echo "推送更改到远程仓库..."
          git pull --rebase origin main
          git push origin HEAD:main
          echo "推送完成"
        else
          echo "没有需要推送的更改"
        fi
    
    - name: ✅ Verify deployment
      if: success()
      run: |
        echo "验证订阅链接..."
        echo "黑名单: https://raw.githubusercontent.com/${{ github.repository }}/main/dist/blacklist.txt"
        echo "白名单: https://raw.githubusercontent.com/${{ github.repository }}/main/dist/whitelist.txt"
        
        # 测试文件是否可访问
        curl -s -I "https://raw.githubusercontent.com/${{ github.repository }}/main/dist/blacklist.txt" | head -1
        curl -s -I "https://raw.githubusercontent.com/${{ github.repository }}/main/dist/whitelist.txt" | head -1
    
    - name: 📧 Send notification (可选)
      if: success() && github.event_name == 'schedule'
      continue-on-error: true
      run: |
        echo "通知功能已禁用"
        # 如需启用，请配置邮件服务并取消注释以下代码
        # curl -X POST -H "Content-Type: application/json" \
        #   -d '{"text":"规则更新完成: '${{ github.repository }}'"}' \
        #   ${{ secrets.WEBHOOK_URL }}
