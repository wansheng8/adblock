name: AdBlock Rules Auto-Updater - 完整语法版

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,8,16 * * *'  # 北京时间 08:00, 16:00, 00:00
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'sources/gz.txt'
      - 'scripts/**'
      - 'rules/custom/**'
      - '.github/workflows/update-rules.yml'

env:
  PYTHON_VERSION: '3.11'
  VALIDITY_THRESHOLD: '90'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
    
    - name: Step 1 - 环境准备
      run: |
        echo "📁 环境准备..."
        mkdir -p dist rules/raw rules/processed rules/custom
        
        # 检查重要文件
        if [ ! -f "sources/sources.json" ]; then
          echo "❌ sources/sources.json 文件不存在"
          exit 1
        fi
        
        if [ ! -f "scripts/update_rules.py" ]; then
          echo "❌ scripts/update_rules.py 文件不存在"
          exit 1
        fi
    
    - name: Step 2 - 规则源同步
      id: update-rules
      run: |
        echo "🚀 规则源同步..."
        python scripts/update_rules.py
        UPDATE_STATUS=$?
        
        if [ $UPDATE_STATUS -eq 0 ]; then
          echo "✅ 规则源同步成功"
          echo "update_success=true" >> "$GITHUB_OUTPUT"
        else
          echo "❌ 规则源同步失败"
          echo "update_success=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi
        
        # 检查生成的文件
        if [ -f dist/dns.txt ] && [ -s dist/dns.txt ]; then
          echo "✅ dns.txt 生成成功"
        else
          echo "❌ dns.txt 生成失败"
          exit 1
        fi
        
        if [ -f dist/hosts.txt ] && [ -s dist/hosts.txt ]; then
          echo "✅ hosts.txt 生成成功"
        else
          echo "❌ hosts.txt 生成失败"
          exit 1
        fi
        
        if [ -f dist/filter.txt ] && [ -s dist/filter.txt ]; then
          echo "✅ filter.txt 生成成功"
        else
          echo "❌ filter.txt 生成失败"
          exit 1
        fi
    
    - name: Step 3 - 规则格式化
      if: steps.update-rules.outputs.update_success == 'true'
      run: |
        echo "🔄 规则格式化..."
        python scripts/format_rules.py
    
    - name: Step 4 - 规则验证
      if: steps.update-rules.outputs.update_success == 'true'
      run: |
        echo "🔍 规则验证..."
        if [ -f scripts/validate_rules.py ]; then
          python scripts/validate_rules.py --simple
          VALIDATION_STATUS=$?
          
          if [ $VALIDATION_STATUS -eq 0 ]; then
            echo "✅ 规则验证通过"
            echo "validation_passed=true" >> "$GITHUB_OUTPUT"
            echo "validation_exit_code=0" >> "$GITHUB_OUTPUT"
          elif [ $VALIDATION_STATUS -eq 1 ]; then
            echo "⚠️  规则验证警告"
            echo "validation_passed=true" >> "$GITHUB_OUTPUT"
            echo "validation_exit_code=1" >> "$GITHUB_OUTPUT"
          else
            echo "❌ 规则验证失败"
            echo "validation_passed=false" >> "$GITHUB_OUTPUT"
            echo "validation_exit_code=$VALIDATION_STATUS" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "ℹ️  验证脚本不存在，跳过验证"
          echo "validation_passed=true" >> "$GITHUB_OUTPUT"
          echo "validation_exit_code=0" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Step 5 - 检查变更
      id: check-changes
      run: |
        echo "🔄 检查变更..."
        git add -A
        if git diff --cached --quiet; then
          echo "✅ 没有检测到变更"
          echo "changes_detected=false" >> "$GITHUB_OUTPUT"
        else
          echo "🔄 检测到变更"
          echo "changes_detected=true" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Step 6 - 提交变更
      if: steps.check-changes.outputs.changes_detected == 'true'
      run: |
        echo "📤 提交变更..."
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 获取文件统计
        DNS_COUNT=$(grep -v '^#' dist/dns.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        HOSTS_COUNT=$(grep -v '^#' dist/hosts.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        FILTER_COUNT=$(grep -v '^!' dist/filter.txt 2>/dev/null | grep -v '^$' | wc -l 2>/dev/null || echo "0")
        TOTAL_COUNT=$((DNS_COUNT + HOSTS_COUNT + FILTER_COUNT))
        
        COMMIT_TIME=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')
        
        {
          echo "🤖 自动更新广告拦截规则 - 完整语法版"
          echo ""
          echo "📊 规则统计:"
          echo "- DNS规则: $DNS_COUNT 条"
          echo "- Hosts规则: $HOSTS_COUNT 条"
          echo "- 浏览器规则: $FILTER_COUNT 条"
          echo "- 总计: $TOTAL_COUNT 条"
          echo ""
          echo "🎯 语法支持:"
          echo "- 白名单 (@@)"
          echo "- 精确域名"
          echo "- 子域/通配 (||domain^)"
          echo "- CNAME拦截"
          echo "- 分类规则"
          echo "- 响应策略"
          echo ""
          echo "⏰ 更新时间: $COMMIT_TIME (北京时间)"
        } > /tmp/commit_message.txt
        
        git commit -F /tmp/commit_message.txt
        git push origin HEAD:main
        
        echo "✅ 变更已提交"
    
    - name: Step 7 - 生成摘要
      if: always()
      run: |
        echo "📋 工作流摘要"
        echo "-------------"
        echo "状态: ${{ job.status }}"
        echo "规则更新: ${{ steps.update-rules.outputs.update_success || '未知' }}"
        echo "变更检测: ${{ steps.check-changes.outputs.changes_detected || '未知' }}"
        
        if [ -d dist ]; then
          echo ""
          echo "📁 生成的文件:"
          for file in dist/*; do
            if [ -f "$file" ]; then
              size=$(wc -c < "$file" 2>/dev/null || echo "0")
              if [ "$size" -ge 1048576 ]; then
                human_size="$((size/1048576))MB"
              elif [ "$size" -ge 1024 ]; then
                human_size="$((size/1024))KB"
              else
                human_size="${size}B"
              fi
              echo "- $(basename "$file"): $human_size"
            fi
          done
        fi
