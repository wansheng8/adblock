name: AdBlock Rules Auto-Updater

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0,8,16 * * *'
  push:
    branches: [main]
    paths:
      - 'sources/sources.json'
      - 'scripts/**'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml
    
    - name: Create directories
      run: |
        mkdir -p dist
        mkdir -p rules/raw
    
    - name: Step 1 - 规则源同步
      run: |
        echo "┌─────────────────┐"
        echo "│   规则源同步    │"
        echo "│  (12+个源)      │"
        echo "└─────────────────┘"
        python scripts/update_rules.py
    
    - name: Step 2 - 规则处理引擎
      run: |
        echo "┌─────────────────┐"
        echo "│   规则处理引擎   │"
        echo "│  (合并/去重)    │"
        echo "└─────────────────┘"
        echo "规则处理已完成"
    
    - name: Step 3 - 规则验证器
      run: |
        echo "┌─────────────────┐"
        echo "│   规则验证器    │"
        echo "│  (语法检查)    │"
        echo "└─────────────────┘"
        python scripts/validate_rules.py
    
    - name: Step 4 - 规则优化器
      run: |
        echo "┌─────────────────┐"
        echo "│   规则优化器    │"
        echo "│  (性能优化)    │"
        echo "└─────────────────┘"
        if [ -f scripts/format_rules.py ]; then
          python scripts/format_rules.py
        else
          echo "跳过规则优化"
        fi
    
    - name: Step 5 - 规则生成器
      run: |
        echo "┌─────────────────┐"
        echo "│   规则生成器    │"
        echo "│  (格式转换)     │"
        echo "└─────────────────┘"
        echo "规则文件已生成到 dist/"
    
    - name: Step 6 - 发布准备
      run: |
        echo "┌─────────────────────────────────────────────────┐"
        echo "│             发布到 GitHub / CDN                 │"
        echo "│    • blacklist.txt (主规则)                     │"
        echo "│    • whitelist.txt (例外规则)                   │"
        echo "│    • metadata.json (元数据)                     │"
        echo "└─────────────────────────────────────────────────┘"
        
        if [ -f dist/metadata.json ]; then
          black_count=$(grep -o '"blacklist_rules":[0-9]*' dist/metadata.json | cut -d: -f2 || echo "0")
          white_count=$(grep -o '"whitelist_rules":[0-9]*' dist/metadata.json | cut -d: -f2 || echo "0")
          echo "统计: 黑名单 $black_count 条, 白名单 $white_count 条"
        fi
    
    - name: Step 7 - 检查变更
      id: check
      run: |
        git add -A
        if git diff --cached --quiet; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "无变更"
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "检测到变更"
        fi
    
    - name: Step 8 - 提交变更
      if: steps.check.outputs.has_changes == 'true'
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        date_str=$(date +'%Y-%m-%d %H:%M')
        git commit -m "🤖 Auto-update rules [$date_str]" -m "由 GitHub Actions 自动更新"
        git push
